<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling - Admin Panel V24</title>
    <style>
        body { background: #000; color: #ff0055; font-family: monospace; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .box { width: 100%; max-width: 500px; border: 2px solid #ff0055; padding: 20px; background: #0a0a0a; box-shadow: 0 0 15px rgba(255,0,85,0.2); }
        input, textarea, button { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #ff0055; color: #fff; outline: none; font-family: monospace; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #ff0055; color: #000; }
        .hidden { display: none; }
        .item { border: 1px solid #333; padding: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; gap: 8px; background: #111; }
        .item span { font-size: 13px; flex: 1; }
        .item button { width: auto; padding: 6px 14px; margin: 0; font-size: 12px; background: #1a0000; border-color: #ff0055; color: #ff0055; }
        .item button.btn-ok { border-color: #00ffcc; color: #00ffcc; }
        .item button.btn-ok:hover { background: #00ffcc; color: #000; }
        hr { border-color: #330011; margin: 20px 0; }
        h2 { margin-bottom: 12px; text-align: center; border-bottom: 1px solid #ff0055; padding-bottom: 10px; }
        h3 { margin: 12px 0 4px; color: #ff4488; font-size: 14px; border-left: 3px solid #ff0055; padding-left: 8px; }

        /* 任務列表管理 */
        #mission-list-admin { margin-top: 10px; }
        .m-admin-item { border: 1px solid #330011; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13px; background: #0a0005; }
        .m-admin-item .m-info { flex: 1; }
        .m-admin-item .m-info b { color: #ff4488; font-size: 15px; }
        .m-admin-item .m-info span { color: #888; font-size: 11px; display: block; margin-top: 4px; }
        .m-admin-item button { width: auto; padding: 5px 10px; margin: 0; font-size: 11px; color: #ff0055; border-color: #330011; }
        .m-admin-item button:hover { background: #ff0055; color: #fff; }

        /* 玩家資訊查詢 */
        #player-info { background: #0a0a0a; border: 1px solid #330011; padding: 14px; margin-top: 10px; font-size: 13px; line-height: 1.8; }
        #player-info .pi-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #222; padding: 4px 0; }
        #player-info .pi-label { color: #888; }
        #player-info .pi-val { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box" id="gate">
        <h2>『後台加密鎖』</h2>
        <p style="text-align:center; color:#666; font-size:12px;">請輸入 4 位數管理員授權碼</p>
        <input type="password" id="pw" placeholder="****" maxlength="4" style="text-align:center; font-size:24px; letter-spacing:10px;" onkeydown="if(event.key==='Enter')unlock()">
        <button onclick="unlock()">執行解鎖</button>
    </div>

    <div class="box hidden" id="panel">
        <h2>『管理員終端 V24』</h2>

        <!-- 發布任務 -->
        <h3>▶ 發布新委託任務 (單次性)</h3>
        <input type="text" id="t" placeholder="任務標題 (例: 突破 C 級傳送門)">
        <input type="text" id="d" placeholder="任務說明與條件">
        <input type="number" id="r" placeholder="獎勵金額 (G)">
        <button onclick="addM()" style="background:#ff0055; color:#000;">✚ 推播至全伺服器</button>

        <!-- 現有任務管理 -->
        <hr>
        <h3>▶ 全服未接取任務清單</h3>
        <div id="mission-list-admin"><span style="color:#333;font-size:12px;">載入中...</span></div>

        <!-- 待審核回報 -->
        <hr>
        <h3>▶ 玩家回報審核 (核准後任務將永久銷毀)</h3>
        <div id="reps"><span style="color:#333;font-size:12px;">暫無回報</span></div>

        <!-- 玩家查詢 -->
        <hr>
        <h3>▶ 玩家資料庫調閱</h3>
        <div style="display:flex;gap:8px;">
            <input type="text" id="query-uid" placeholder="輸入玩家 ID" style="margin:0;flex:1;">
            <button onclick="queryPlayer()" style="width:auto;margin:0;padding:12px 16px;">查詢</button>
        </div>
        <div id="player-info" class="hidden"></div>

        <!-- 手動發金 -->
        <hr>
        <h3>▶ 系統金幣直匯</h3>
        <div style="display:flex;gap:8px;">
            <input type="text" id="manual-uid" placeholder="玩家 ID" style="margin:0;flex:1;">
            <input type="number" id="manual-gold" placeholder="金額" style="margin:0;width:100px;">
            <button onclick="manualGold()" style="width:auto;margin:0;padding:12px 16px;">發放</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const config = { apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo", authDomain: "my-gacha-game-f7663.firebaseapp.com", projectId: "my-gacha-game-f7663", storageBucket: "my-gacha-game-f7663.firebasestorage.app", messagingSenderId: "1035192644413", appId: "1:1035192644413:web:1ad5337b9760a154cf8b54" };
        const db = getFirestore(initializeApp(config));

        let currentGameData = null;

        // 解鎖後台
        window.unlock = () => {
            if (document.getElementById('pw').value === "0414") {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('panel').classList.remove('hidden');
                loadData();
            } else {
                alert("授權碼錯誤！");
                document.getElementById('pw').value = '';
            }
        };

        // 即時監聽 game_data
        function loadData() {
            onSnapshot(doc(db, "config", "game_data"), (s) => {
                currentGameData = s.exists() ? s.data() : { missions: [], reports: [] };
                renderMissions(currentGameData.missions || []);
                renderReports(currentGameData.reports || []);
            });
        }

        // 發布任務 (使用 setDoc + merge 確保即使資料庫空了也能成功建立)
        window.addM = async () => {
            const title = document.getElementById('t').value.trim();
            const desc = document.getElementById('d').value.trim();
            const reward = parseInt(document.getElementById('r').value);
            if (!title || !desc || isNaN(reward)) return alert("請填寫完整任務資訊！");
            
            const m = { id: "m" + Date.now(), title, desc, reward };
            
            try {
                await setDoc(doc(db, "config", "game_data"), { missions: arrayUnion(m) }, { merge: true });
                document.getElementById('t').value = '';
                document.getElementById('d').value = '';
                document.getElementById('r').value = '';
                alert(`✓ 任務「${title}」已成功推播至前端！`);
            } catch (error) {
                console.error(error);
                alert("發布失敗，請檢查權限與連線！");
            }
        };

        // 渲染任務管理列表
        function renderMissions(missions) {
            const area = document.getElementById('mission-list-admin');
            if (missions.length === 0) {
                area.innerHTML = '<span style="color:#666;font-size:12px;">目前全服無未接取任務。</span>';
                return;
            }
            area.innerHTML = missions.map(m => `
                <div class="m-admin-item">
                    <div class="m-info">
                        <b>${m.title}</b>
                        <span>${m.desc} | 💰 ${m.reward}G</span>
                    </div>
                    <button onclick="removeM('${m.id}')">強制刪除</button>
                </div>
            `).join('');
        }

        // 強制刪除未被完成的任務
        window.removeM = async (mid) => {
            if (!confirm("確定要將此任務從全服下架？")) return;
            const m = (currentGameData?.missions || []).find(x => x.id === mid);
            if (!m) return alert("找不到任務！");
            await updateDoc(doc(db, "config", "game_data"), { missions: arrayRemove(m) });
        };

        // 渲染待審核回報
        function renderReports(reports) {
            const area = document.getElementById('reps');
            if (reports.length === 0) {
                area.innerHTML = '<span style="color:#666;font-size:12px;">全服玩家都在摸魚，暫無回報。</span>';
                return;
            }
            area.innerHTML = reports.map(rep => {
                const mInfo = (currentGameData?.missions || []).find(x => x.id === rep.mid);
                const mTitle = mInfo ? mInfo.title : "已失效的未知任務";
                return `
                <div class="item">
                    <span style="line-height:1.5;">
                        <b style="color:#ff4488">${rep.uid}</b> 回報完成<br>
                        <b style="color:#fff">${mTitle}</b>
                    </span>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <button class="btn-ok" onclick="ok('${rep.uid}', '${rep.mid}')">✓ 核准並銷毀任務</button>
                        <button onclick="reject('${rep.uid}', '${rep.mid}')">✗ 駁回退件</button>
                    </div>
                </div>
            `}).join('');
        }

        // 審核通過：發放獎勵 + 永久銷毀全服任務
        window.ok = async (uid, mid) => {
            const m = (currentGameData?.missions || []).find(x => x.id === mid);
            if (!m) return alert("該任務已不存在，無法核准！");
            
            if (!confirm(`確認核准 ${uid} 的回報？\n發放 ${m.reward}G 後，該任務將從全伺服器永久下架！`)) return;

            const uRef = doc(db, "users", uid);
            const configRef = doc(db, "config", "game_data");

            try {
                const uSnap = await getDoc(uRef);
                if (!uSnap.exists()) return alert("找不到該玩家資料！");
                
                const curGold = uSnap.data().gold || 0;

                // 1. 給玩家加錢、解除他的等待審核狀態
                await updateDoc(uRef, { gold: curGold + m.reward, pending: arrayRemove(mid) });

                // 2. 從全局資料庫中徹底銷毀這個任務，並清除這筆報表
                await updateDoc(configRef, { 
                    missions: arrayRemove(m),
                    reports: arrayRemove({ uid: uid, mid: mid }) 
                });

                alert(`✓ 獎勵已發放！任務「${m.title}」已正式結案並銷毀。`);
            } catch (err) {
                console.error(err);
                alert("執行失敗，請檢查主控台報錯。");
            }
        };

        // 審核拒絕：不發錢，解除玩家等待狀態，任務仍留在全服
        window.reject = async (uid, mid) => {
            if (!confirm(`確定駁回 ${uid} 的回報？（不發放金幣，退回給玩家重解）`)) return;
            try {
                await updateDoc(doc(db, "users", uid), { pending: arrayRemove(mid) });
                await updateDoc(doc(db, "config", "game_data"), { reports: arrayRemove({ uid: uid, mid: mid }) });
                alert(`✗ 已駁回該筆回報。`);
            } catch (err) {
                console.error(err);
            }
        };

        // 玩家資訊查詢
        window.queryPlayer = async () => {
            const uid = document.getElementById('query-uid').value.trim();
            if (!uid) return alert("請輸入玩家 ID！");
            const snap = await getDoc(doc(db, "users", uid));
            const infoBox = document.getElementById('player-info');
            if (!snap.exists()) {
                infoBox.classList.remove('hidden');
                infoBox.innerHTML = '<span style="color:#ff0055">資料庫無此玩家紀錄！</span>';
                return;
            }
            const d = snap.data();
            const inv = d.inventory || [];
            
            // 防呆計算：確保只計算正常的卡片物件
            const validCards = inv.filter(c => typeof c === 'object' && c.rarity);
            const totalCards = validCards.reduce((acc, c) => acc + (c.count || 1), 0);
            
            infoBox.classList.remove('hidden');
            infoBox.innerHTML = `
                <div class="pi-row"><span class="pi-label">玩家識別 ID</span><span class="pi-val" style="color:#00ffcc">${uid}</span></div>
                <div class="pi-row"><span class="pi-label">持有多金幣</span><span class="pi-val" style="color:#ffd700">${d.gold || 0} G</span></div>
                <div class="pi-row"><span class="pi-label">保底墊刀數</span><span class="pi-val">${d.pity_count || 0} / 50</span></div>
                <div class="pi-row"><span class="pi-label">最後簽到日</span><span class="pi-val">${d.lastSignIn || '從未簽到'}</span></div>
                <div class="pi-row"><span class="pi-label">卡牌總數量</span><span class="pi-val">${totalCards} 張</span></div>
                <div class="pi-row"><span class="pi-label">圖鑑解鎖率</span><span class="pi-val">${validCards.length} 種</span></div>
                <div class="pi-row"><span class="pi-label">待審核任務</span><span class="pi-val">${(d.pending || []).length > 0 ? (d.pending || []).join(', ') : '無'}</span></div>
            `;
        };

        // 手動發放金幣
        window.manualGold = async () => {
            const uid = document.getElementById('manual-uid').value.trim();
            const amount = parseInt(document.getElementById('manual-gold').value);
            if (!uid || isNaN(amount) || amount <= 0) return alert("請填寫正確的玩家 ID 與匯款金額！");
            
            const uRef = doc(db, "users", uid);
            try {
                const snap = await getDoc(uRef);
                if (!snap.exists()) return alert("找不到該玩家！請確認 ID 是否正確。");
                const curGold = snap.data().gold || 0;
                await updateDoc(uRef, { gold: curGold + amount });
                alert(`✓ 金幣空投成功！已匯入 ${amount}G 至 ${uid} 帳戶。\n目前餘額：${curGold + amount}G`);
                document.getElementById('manual-uid').value = '';
                document.getElementById('manual-gold').value = '';
            } catch (err) {
                console.error(err);
                alert("發放失敗！");
            }
        };
    </script>
</body>
</html>
