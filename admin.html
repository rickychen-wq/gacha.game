<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Association - 總部後台系統</title>
    <style>
        /* ================= 後台專屬黑客風格 ================= */
        body { 
            background: #0f172a; 
            color: #e2e8f0; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 20px; 
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { 
            color: #38bdf8; 
            border-bottom: 2px solid #334155; 
            padding-bottom: 10px; 
            text-shadow: 0 0 10px rgba(56,189,248,0.3);
        }
        .section { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border: 1px solid #334155; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h3 { color: #a855f7; margin-top: 0; }
        input, select { 
            padding: 10px; 
            margin: 5px 5px 5px 0; 
            background: #020617; 
            color: #e2e8f0; 
            border: 1px solid #475569; 
            border-radius: 4px; 
            outline: none;
        }
        input:focus, select:focus { border-color: #38bdf8; }
        button { 
            padding: 10px 15px; 
            background: rgba(56,189,248,0.15); 
            color: #38bdf8; 
            border: 1px solid #38bdf8; 
            border-radius: 4px;
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
        }
        button:hover { 
            background: #38bdf8; 
            color: #0f172a; 
        }
        .btn-danger {
            background: rgba(244, 63, 94, 0.15);
            color: #f43f5e;
            border-color: #f43f5e;
        }
        .btn-danger:hover {
            background: #f43f5e;
            color: #0f172a;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
        }
        th, td { 
            border: 1px solid #334155; 
            padding: 10px; 
            text-align: left; 
        }
        th { 
            background: #020617; 
            color: #38bdf8; 
        }
        tr:nth-child(even) { background: rgba(255,255,255,0.02); }

        /* ================= 權限驗證鎖 ================= */
        #admin-login {
            position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(2,6,23,0.95); 
            backdrop-filter: blur(10px);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            z-index: 10000;
        }
        #admin-login h2 { color: #f43f5e; letter-spacing: 2px; }
        #admin-login input { width: 250px; text-align: center; font-size: 18px; letter-spacing: 5px; }
        #admin-panel { display: none; }
    </style>
</head>
<body>

    <!-- 🚨 權限驗證畫面 -->
    <div id="admin-login">
        <h2>⚠️ 總部權限驗證</h2>
        <input type="password" id="admin-pw" placeholder="輸入存取密碼">
        <button onclick="verifyAdmin()" style="margin-top: 15px; width: 250px;">解鎖系統</button>
    </div>

    <!-- 🔓 後台主要控制台 (預設隱藏) -->
    <div id="admin-panel">
        <h1>🛠️ 獵人協會 - 總部終端機</h1>

        <div class="section">
            <h3>💰 系統配給 (修改金幣)</h3>
            <input type="text" id="gold-uid" placeholder="輸入獵人 ID">
            <input type="number" id="gold-amount" placeholder="輸入要配發的總金幣">
            <button onclick="updateGold()">覆寫金幣</button>
        </div>

        <div class="section">
            <h3>🎴 強制派發遺物 (發送卡片)</h3>
            <p style="font-size:12px; color:#94a3b8; margin-bottom:10px;">⚠️ 這裡的名單已與前台100%同步，絕對不會破圖。</p>
            <input type="text" id="card-uid" placeholder="輸入獵人 ID">
            
            <select id="card-pool" onchange="updateRankSelect()">
                <option value="frieren">芙莉蓮卡池 (Frieren)</option>
                <option value="elite">實力至上卡池 (Elite)</option>
            </select>
            
            <select id="card-rank" onchange="updateFileSelect()">
                <option value="sss">SSS 級</option>
                <option value="ss">SS 級</option>
                <option value="s">S 級</option>
                <option value="a">A 級</option>
                <option value="b">B 級</option>
                <option value="c">C 級</option>
                <option value="d">D 級</option>
            </select>
            
            <select id="card-file"></select>
            
            <button onclick="giveCard()">強制入庫</button>
        </div>

        <!-- 🚨 V56 補回的發佈任務系統 -->
        <div class="section">
            <h3>📢 佈達全服委託 (發佈任務)</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="mission-title" placeholder="任務標題 (例：討伐A級魔物)" style="flex: 1; min-width: 200px;">
                <input type="text" id="mission-desc" placeholder="任務描述" style="flex: 2; min-width: 300px;">
                <input type="number" id="mission-reward" placeholder="獎勵金幣 (G)" style="width: 150px;">
            </div>
            <div style="margin-top: 10px;">
                <button onclick="postMission()">發佈任務至全服</button>
                <button class="btn-danger" onclick="clearMissions()" style="margin-left: 10px;">清空所有任務</button>
            </div>
        </div>

        <div class="section">
            <h3>📋 任務審核 (處理回報)</h3>
            <div id="report-list">連線中...</div>
        </div>

        <div class="section">
            <h3>👥 全服獵人監控名單</h3>
            <button onclick="loadUsers()">刷新資料</button>
            <div id="user-list">等待授權載入...</div>
        </div>
    </div>

    <!-- ================= 程式邏輯核心 ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, onSnapshot, arrayRemove, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Firebase 初始化
        const config = { 
            apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo", 
            authDomain: "my-gacha-game-f7663.firebaseapp.com", 
            projectId: "my-gacha-game-f7663", 
            storageBucket: "my-gacha-game-f7663.firebasestorage.app", 
            messagingSenderId: "1035192644413", 
            appId: "1:1035192644413:web:1ad5337b9760a154cf8b54" 
        };
        const app = initializeApp(config); 
        const db = getFirestore(app);

        // ================= 權限驗證 =================
        window.verifyAdmin = () => {
            const pw = document.getElementById('admin-pw').value;
            if(pw === '0414') {
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadUsers(); 
                listenReports(); 
            } else {
                alert("❌ 存取拒絕：密碼錯誤！");
            }
        };

        // 🚨 後台同步名單
        const pools = {
            'frieren': { 
                sss: ['sss魔王城.jpg'], 
                ss: ['ss月影.jpg'], 
                s: ['s 日恆.webp', 's月光.jpg', 's欣梅爾.jpg', 's芙莉蓮.jpg', 's賽利耶 .jpg'], 
                a: ['a修塔爾克.jpg', 'a費倫 (2).jpg', 'a費倫.jpg', 'a瑪哈特.jpg', 'a讚恩.jpg'], 
                b: ['b冉則.jpg', 'b由貝爾 (2).jpg', 'b由貝爾 (3).jpg', 'b由貝爾.jpg', 'b威亞貝爾.jpg', 'b梅特戴.jpg', 'b葛納烏.jpg', 'b鄧肯.jpg', 'b蘭特.jpg'], 
                c: ['c艾莉.jpg', 'c拉比涅.jpg', 'c拉歐芬.jpg', 'c阿烏拉 (2).jpg', 'c阿烏拉 (3).jpg', 'c阿烏拉 (4).jpg', 'c阿烏拉.jpg'], 
                d: ['d未知 (2).jpg', 'd未知.jpg', 'd艾冉 (2).jpg', 'd艾冉.jpg', 'd欣梅爾.jpg', 'd海塔 (2).jpg', 'd海塔.jpg', 'd魔族 (2).jpg', 'd魔族 (3).jpg', 'd魔族 (4).jpg', 'd魔族.jpg'] 
            },
            'elite': { 
                sss: ['sss1.jpg', 'sss2.jpg', 'sss3.jpg'], 
                ss: ['ss1.jpg'], 
                s: ['s1.jpg', 's2.jpg', 's3.jpg', 's4.jpg'], 
                a: ['a1.jpg', 'a2.jpg', 'a3.jpg', 'a4.jpg', 'a5.jpg', 'a6.jpg'], 
                b: ['b1.jpg', 'b2.jpg', 'b3.jpg', 'b4.jpg', 'b5.jpg', 'b6.jpg'], 
                c: ['c2.jpg', 'c3.jpg', 'c4.jpg', 'c5.jpg', 'c6.jpg'], 
                d: ['d1.jpg'] 
            }
        };

        window.updateRankSelect = () => { window.updateFileSelect(); };

        window.updateFileSelect = () => {
            const pool = document.getElementById('card-pool').value;
            const rank = document.getElementById('card-rank').value;
            const fileSel = document.getElementById('card-file');
            fileSel.innerHTML = '';
            
            const files = pools[pool][rank] || [];
            if(files.length === 0) {
                fileSel.innerHTML = `<option value="">(無資料)</option>`;
                return;
            }
            files.forEach(f => { fileSel.innerHTML += `<option value="${f}">${f}</option>`; });
        };
        updateFileSelect();

        // 【發送金幣】
        window.updateGold = async () => {
            const uid = document.getElementById('gold-uid').value.trim();
            const amt = parseInt(document.getElementById('gold-amount').value);
            if(!uid || isNaN(amt)) return alert("❌ 錯誤：請輸入正確的 ID 與數量");

            const ref = doc(db, "users", uid);
            const snap = await getDoc(ref);
            if(snap.exists()){
                await updateDoc(ref, { gold: amt });
                alert(`✅ 成功：已將獵人 [${uid}] 的配給修改為 ${amt} G`);
                loadUsers();
            } else { alert("❌ 錯誤：找不到該獵人資料"); }
        };

        // 【派發特定卡片】
        window.giveCard = async () => {
            const uid = document.getElementById('card-uid').value.trim();
            const pool = document.getElementById('card-pool').value;
            const rank = document.getElementById('card-rank').value;
            const file = document.getElementById('card-file').value;

            if(!uid || !file) return alert("❌ 錯誤：請填寫完整資訊");

            const ref = doc(db, "users", uid);
            const snap = await getDoc(ref);
            
            if(snap.exists()){
                let data = snap.data();
                let inv = data.inventory || [];
                let cardId = `${pool}_${rank}_${file}`;
                let imgPath = `images/${pool}/${file}`;

                let idx = inv.findIndex(c => c.id === cardId);
                if(idx > -1) { inv[idx].count += 1; } 
                else { inv.push({ id: cardId, pool: pool, rarity: rank, img: imgPath, count: 1 }); }

                await updateDoc(ref, { inventory: inv });
                alert(`✅ 成功派發：[${rank.toUpperCase()}] ${file} 已送達獵人 ${uid} 的圖鑑！`);
                loadUsers();
            } else { alert("❌ 錯誤：找不到該獵人資料"); }
        };

        // ================= 🚨 V56 補回：發佈任務系統 =================
        window.postMission = async () => {
            const title = document.getElementById('mission-title').value.trim();
            const desc = document.getElementById('mission-desc').value.trim();
            const reward = parseInt(document.getElementById('mission-reward').value);

            if(!title || !desc || isNaN(reward)) return alert("❌ 錯誤：標題、描述、獎勵金幣皆不可空白！");

            const newMission = {
                id: 'm_' + Date.now(),
                title: title,
                desc: desc,
                reward: reward
            };

            const gRef = doc(db, "config", "game_data");
            const snap = await getDoc(gRef);
            
            if(snap.exists()) {
                await updateDoc(gRef, { missions: arrayUnion(newMission) });
            } else {
                await setDoc(gRef, { missions: [newMission], reports: [] });
            }
            
            // 清空輸入框
            document.getElementById('mission-title').value = '';
            document.getElementById('mission-desc').value = '';
            document.getElementById('mission-reward').value = '';
            
            alert("✅ 任務已成功發佈至全服！玩家重新整理即可看見。");
        };

        // ================= 🚨 V56 補回：清空任務系統 =================
        window.clearMissions = async () => {
            if(!confirm("⚠️ 確定要清空全服所有任務嗎？（玩家回報中的任務不受影響）")) return;
            
            const gRef = doc(db, "config", "game_data");
            await updateDoc(gRef, { missions: [] });
            alert("🗑️ 所有任務已從伺服器清空！");
        };

        // 【讀取全服玩家】
        window.loadUsers = async () => {
            const list = document.getElementById('user-list');
            list.innerHTML = '<span style="color:#64748b;">掃描資料庫中...</span>';
            
            const qs = await getDocs(collection(db, "users"));
            if(qs.empty) {
                list.innerHTML = '<span style="color:#64748b;">目前伺服器尚無獵人資料。</span>';
                return;
            }

            let html = '<table><tr><th>獵人 ID</th><th>系統金幣</th><th>已解鎖卡片種類</th><th>密碼核對</th></tr>';
            qs.forEach(doc => {
                let d = doc.data();
                let cCount = (d.inventory || []).length;
                html += `<tr><td style="color:#38bdf8; font-weight:bold;">${doc.id}</td><td style="color:#facc15;">${d.gold || 0} G</td><td>${cCount} 種</td><td style="color:#64748b; font-size:12px;">${d.password || '無'}</td></tr>`;
            });
            html += '</table>';
            list.innerHTML = html;
        };

        // 【任務審核監聽】
        function listenReports() {
            onSnapshot(doc(db, "config", "game_data"), (s) => {
                const list = document.getElementById('report-list');
                list.innerHTML = '';
                if(s.exists() && s.data().reports && s.data().reports.length > 0) {
                    s.data().reports.forEach(r => {
                        list.innerHTML += `<div style="background:#020617; padding:12px; margin-bottom:8px; border:1px solid #475569; border-left:3px solid #facc15; display:flex; justify-content:space-between; align-items:center;"><div><span style="color:#94a3b8; font-size:12px;">申請人：</span><b style="color:#e2e8f0;">${r.uid}</b><br><span style="color:#94a3b8; font-size:12px;">任務編號：</span><b style="color:#a855f7;">${r.mid}</b></div><button onclick="approveMission('${r.uid}', '${r.mid}')">核准 (+200G)</button></div>`;
                    });
                } else { list.innerHTML = '<span style="color:#64748b;">通訊頻道無新回報。</span>'; }
            });
        }

        // 【核准任務】
        window.approveMission = async (uid, mid) => {
            const reward = 200;
            const uRef = doc(db, "users", uid);
            const uSnap = await getDoc(uRef);
            if(uSnap.exists()) {
                await updateDoc(uRef, { gold: (uSnap.data().gold || 0) + reward, pending: arrayRemove(mid) });
            }
            const gRef = doc(db, "config", "game_data");
            await updateDoc(gRef, { reports: arrayRemove({uid: uid, mid: mid}) });
            alert(`✅ 任務 ${mid} 已核准！已將 ${reward}G 匯入 ${uid} 帳戶。`);
            loadUsers();
        };

        // 綁定 Enter 鍵觸發登入
        document.getElementById("admin-pw").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                verifyAdmin();
            }
        });
    </script>
</body>
</html>
