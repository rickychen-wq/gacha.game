<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: TCG V22</title>
    <style>
        /* 這裡繼承 V21 的所有 CSS，加上金幣 UI */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; user-select: none; }
        #app-container { width: 100%; max-width: 400px; height: 100%; max-height: 900px; background: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%); position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0, 255, 204, 0.1); border-left: 1px solid #222; border-right: 1px solid #222; }
        .top-bar { height: 60px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #00ffcc; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 10; }
        .currency-box { display: flex; align-items: center; gap: 5px; background: rgba(255, 215, 0, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid #ffd700; }
        .gold-amount { color: #fff; font-size: 14px; font-weight: bold; }
        .main-scroll { flex: 1; overflow-y: auto; padding: 15px; position: relative; }
        .banner-area { width: 100%; height: 160px; background: #111; border: 2px solid #333; border-radius: 12px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .banner-area img { width: 100%; height: 100%; object-fit: cover; }
        .banner-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 60%); }
        .banner-text { position: absolute; bottom: 10px; left: 10px; font-size: 16px; font-weight: bold; color: #fff; z-index: 2; }
        .gacha-actions { display: flex; gap: 10px; }
        .action-btn { flex: 1; background: #111; border: 2px solid #00ffcc; color: #00ffcc; font-size: 14px; font-weight: bold; padding: 12px 0; border-radius: 8px; }
        .price-tag { display: block; font-size: 10px; opacity: 0.7; }
        .mission-card { background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #00ffcc; }
        .mission-reward { color: #ffd700; font-weight: bold; }
        .btn-report { width: 100%; margin-top: 10px; padding: 8px; background: #00ffcc; color: #000; border: none; border-radius: 4px; font-weight: bold; }
        .bottom-nav { height: 70px; background: #0a0a0a; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { color: #888; text-align: center; font-size: 11px; }
        .nav-btn.active { color: #00ffcc; }
        #tcg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; perspective: 1200px; }
        #tcg-overlay.active { opacity: 1; pointer-events: auto; }
        #card-stack-container { position: relative; width: 220px; height: 320px; }
        .hidden { display: none !important; }
        /* 這裡加上你 V20 的 fly-away 動畫樣式 */
        @keyframes fly-away { 0% { transform: rotateY(180deg) scale(1.05); opacity: 1; } 20% { transform: rotateY(180deg) scale(1.1) translateY(20px); } 100% { transform: rotateY(180deg) scale(0.5) translateY(-1200px); opacity: 0; } }
        .is-dismissed { animation: fly-away 0.7s forwards; }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="top-bar">
            <h1 id="player-name">ID: ...</h1>
            <div class="currency-box"><span style="color:#ffd700">G</span><span class="gold-amount" id="user-gold">0</span></div>
        </div>
        <div id="tcg-overlay"><div id="card-stack-container"></div><div id="tcg-hint" style="color:#888; margin-top:20px;">[ 點擊翻牌 ]</div></div>
        <div class="main-scroll">
            <div id="gacha-view">
                <div class="pool-tabs" style="display:flex; gap:10px; margin-bottom:15px;">
                    <button class="tab-btn active" onclick="switchPool('freren')">芙莉蓮</button>
                    <button class="tab-btn" onclick="switchPool('elite')">實力至上</button>
                </div>
                <div class="banner-area">
                    <img id="banner-img" src="images/freren/banner.jpg">
                    <div class="banner-overlay"></div>
                    <div class="banner-text" id="banner-text">>_ DUNGEON: 芙莉蓮</div>
                </div>
                <div class="gacha-actions">
                    <button class="action-btn" onclick="checkAndDraw(1, 70)">單抽<span class="price-tag">70 G</span></button>
                    <button class="action-btn" style="border-color:#aa00ff; color:#aa00ff" onclick="checkAndDraw(5, 300)">五連抽<span class="price-tag">300 G</span></button>
                </div>
            </div>
            <div id="mission-view" class="hidden">
                <h2 style="color:#00ffcc; margin-bottom:15px;">每日任務</h2>
                <div id="mission-list"></div>
            </div>
            <div id="backpack-view" class="hidden"><div id="inventory-area"></div></div>
        </div>
        <div class="bottom-nav">
            <div class="nav-btn active" onclick="showV('gacha-view', this)">🔮召喚</div>
            <div class="nav-btn" onclick="showV('mission-view', this)">📜任務</div>
            <div class="nav-btn" onclick="showV('backpack-view', this)">🎒圖鑑</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo", authDomain: "my-gacha-game-f7663.firebaseapp.com", projectId: "my-gacha-game-f7663", storageBucket: "my-gacha-game-f7663.firebasestorage.app", messagingSenderId: "1035192644413", appId: "1:1035192644413:web:1ad5337b9760a154cf8b54" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserDocRef = null, userData = { gold: 0 };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const id = user.email.split('@')[0];
                document.getElementById('player-name').innerText = `ID: ${id}`;
                currentUserDocRef = doc(db, "users", id);
                onSnapshot(currentUserDocRef, (d) => {
                    if (d.exists()) { userData = d.data(); document.getElementById('user-gold').innerText = userData.gold; }
                    else { setDoc(currentUserDocRef, { gold: 500, inventory: [], pendingMissions: [] }); }
                });
                syncMissions();
            } else { window.location.href = "index.html"; }
        });

        async function checkAndDraw(t, p) {
            if (userData.gold < p) { alert("金幣不足！"); return; }
            await updateDoc(currentUserDocRef, { gold: userData.gold - p });
            // 這裡接入你 V20 的 performTCGGacha 邏輯...
        }

        function syncMissions() {
            onSnapshot(doc(db, "config", "game_data"), (d) => {
                const list = document.getElementById('mission-list');
                list.innerHTML = '';
                (d.data().missions || []).forEach(m => {
                    const isWait = userData.pendingMissions?.includes(m.id);
                    list.innerHTML += `<div class="mission-card">
                        <div style="display:flex;justify-content:space-between"><b>${m.title}</b><span class="mission-reward">${m.reward}G</span></div>
                        <p style="font-size:12px;color:#888">${m.desc}</p>
                        <button class="btn-report" onclick="repM('${m.id}')" ${isWait?'disabled style="background:#444"':''}>${isWait?'等待核發':'完成回報'}</button>
                    </div>`;
                });
            });
        }

        window.repM = async (mId) => {
            await updateDoc(currentUserDocRef, { pendingMissions: arrayUnion(mId) });
            await updateDoc(doc(db, "config", "game_data"), { reports: arrayUnion({ uid: auth.currentUser.email.split('@')[0], mid: mId }) });
        };

        window.showV = (id, btn) => {
            ['gacha-view', 'mission-view', 'backpack-view'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
    </script>
</body>
</html>    <!-- ==========================================================================
         [6] JavaScript 邏輯中心 (Firebase + Gacha Engine)
         ========================================================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo", 
            authDomain: "my-gacha-game-f7663.firebaseapp.com", 
            projectId: "my-gacha-game-f7663", 
            storageBucket: "my-gacha-game-f7663.firebasestorage.app", 
            messagingSenderId: "1035192644413", 
            appId: "1:1035192644413:web:1ad5337b9760a154cf8b54" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserDocRef = null;
        let userData = { gold: 0, inventory: [], pendingMissions: [] };
        let currentPoolId = 'freren';

        // 抽卡機率與設定 (繼承 V21)
        const poolSettings = {
            'freren': { 
                sss: ['sss1.jpg'], ss: ['ss1.jpg'], 
                s: ['s1.jpg', 's2.jpg', 's3.webp', 's4.jpg', 's5.jpg'],
                a: ['a1.jpg', 'a2.jpg', 'a3.jpg', 'a5.jpg', 'a6.jpg'],
                b: ['b1.jpg', 'b2.jpg', 'b3.jpg', 'b4.jpg', 'b5.jpg', 'b6.jpg', 'b7.jpg', 'b8.jpg', 'b9.jpg'],
                c: ['c1.jpg', 'c2.jpg', 'c3.jpg', 'c4.jpg', 'c5.jpg', 'c6.jpg', 'c7.jpg', 'c8.jpg', 'c9.jpg', 'c10.jpg'],
                d: ['d1.jpg', 'd2.jpg', 'd3.jpg', 'd4.jpg', 'd5.jpg', 'd6.jpg', 'd7.jpg', 'd8.jpg']
            },
            'elite': { sss: [], ss: [], s: [], a: [], b: [], c: [], d: [] }
        };
        const chances = [
            { r: 'd', p: 0.40 }, { r: 'c', p: 0.30 }, { r: 'b', p: 0.18 },
            { r: 'a', p: 0.08 }, { r: 's', p: 0.03 }, { r: 'ss', p: 0.008 }, { r: 'sss', p: 0.002 }
        ];

        // --------------------------------------------------------------------------
        // [A] 初始化與監聽
        // --------------------------------------------------------------------------
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const id = user.email.split('@')[0];
                document.getElementById('player-name').innerText = `ID: ${id}`;
                currentUserDocRef = doc(db, "users", id);

                onSnapshot(currentUserDocRef, (snap) => {
                    if (snap.exists()) {
                        userData = snap.data();
                        document.getElementById('user-gold').innerText = userData.gold || 0;
                        if (document.getElementById('v-backpack').className !== 'hidden') refreshInventory();
                    } else {
                        setDoc(currentUserDocRef, { gold: 1000, inventory: [], pendingMissions: [] });
                    }
                });
                syncMissions();
            } else {
                window.location.href = "index.html";
            }
        });

        // --------------------------------------------------------------------------
        // [B] 任務邏輯
        // --------------------------------------------------------------------------
        function syncMissions() {
            onSnapshot(doc(db, "config", "game_data"), (snap) => {
                const container = document.getElementById('mission-container');
                container.innerHTML = '';
                const missions = snap.data()?.missions || [];
                missions.forEach(m => {
                    const isPending = userData.pendingMissions?.includes(m.id);
                    container.innerHTML += `
                        <div class="mission-card">
                            <div class="mission-header">
                                <span class="mission-title">${m.title}</span>
                                <span class="mission-reward">+${m.reward} G</span>
                            </div>
                            <p class="mission-desc">${m.desc}</p>
                            <button class="btn-report" onclick="window.submitMission('${m.id}')" ${isPending ? 'disabled' : ''}>
                                ${isPending ? '等待審核中...' : '回報完成'}
                            </button>
                        </div>`;
                });
            });
        }

        window.submitMission = async (mId) => {
            await updateDoc(currentUserDocRef, { pendingMissions: arrayUnion(mId) });
            await updateDoc(doc(db, "config", "game_data"), { 
                reports: arrayUnion({ uid: auth.currentUser.email.split('@')[0], mid: mId, time: Date.now() }) 
            });
            alert("回報成功！請等待管理員確認金幣。");
        };

        // --------------------------------------------------------------------------
        // [C] 抽卡核心 (TCG 飛天版)
        // --------------------------------------------------------------------------
        window.handleDraw = async (times, price) => {
            if (userData.gold < price) { alert("金幣不足！請先去完成任務。"); return; }
            await updateDoc(currentUserDocRef, { gold: userData.gold - price });
            performGachaEffect(times);
        };

        async function performGachaEffect(times) {
            const overlay = document.getElementById('tcg-overlay');
            const container = document.getElementById('card-stack-container');
            const hint = document.getElementById('tcg-hint');
            overlay.classList.add('active');
            container.innerHTML = '';
            hint.innerText = "[ 點擊卡包一次全開 ]";

            let results = [];
            for (let i = 0; i < times; i++) {
                let rand = Math.random(), cum = 0, rank = 'd';
                for (let c of chances) { cum += c.p; if (rand <= cum) { rank = c.r; break; } }
                const pool = poolSettings[currentPoolId][rank];
                results.push({ rank, file: pool[Math.floor(Math.random() * pool.length)], id: `${currentPoolId}_${rank}_${Date.now()}_${i}` });
            }

            let activeIdx = 0;
            let revealed = false;

            results.reverse().forEach((res, i) => {
                const wrap = document.createElement('div');
                wrap.className = 'tcg-card-wrapper';
                wrap.style.transform = `translate(${i * 4}px, ${i * 4}px)`;
                wrap.style.zIndex = times - i;

                let color = res.rank === 's' ? '#ff0055' : (['ss', 'sss'].includes(res.rank) ? '#ffd700' : '#00ffcc');

                wrap.innerHTML = `
                    <div class="tcg-card-inner">
                        <div class="card-face card-back"></div>
                        <div class="card-face card-front" style="border-color:${color}">
                            <img src="images/${currentPoolId}/${res.file}">
                            <div class="rank-banner" style="background:${color}">${res.rank.toUpperCase()}</div>
                        </div>
                    </div>`;

                wrap.onclick = () => {
                    if (i !== activeIdx) return;
                    if (!revealed) {
                        revealed = true;
                        hint.innerText = "[ 點擊收下卡片 ]";
                        document.querySelectorAll('.tcg-card-inner').forEach(el => el.classList.add('is-flipped'));
                        if (navigator.vibrate) navigator.vibrate(hasHighRank(results) ? [100, 50, 100] : 50);
                    } else {
                        wrap.querySelector('.tcg-card-inner').classList.add('is-dismissed');
                        wrap.style.pointerEvents = 'none';
                        activeIdx++;
                        if (activeIdx >= times) finalizeGacha(results);
                    }
                };
                container.appendChild(wrap);
            });
        }

        async function finalizeGacha(res) {
            const ids = res.map(r => `${currentPoolId}_${r.rank}_${resultsIndex(r)}`); // 簡化邏輯
            await updateDoc(currentUserDocRef, { inventory: arrayUnion(...res.map(r => `${currentPoolId}_${r.rank}_0`)) });
            setTimeout(() => document.getElementById('tcg-overlay').classList.remove('active'), 500);
        }

        function resultsIndex(r) { return poolSettings[currentPoolId][r.rank].indexOf(r.file); }
        function hasHighRank(arr) { return arr.some(r => ['s', 'ss', 'sss'].includes(r.rank)); }

        // --------------------------------------------------------------------------
        // [D] UI 切換邏輯
        // --------------------------------------------------------------------------
        window.switchTab = (id, btn) => {
            ['v-gacha', 'v-mission', 'v-backpack'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (id === 'v-backpack') refreshInventory();
        };

        window.changePool = (pId, btn) => {
            currentPoolId = pId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('banner-img').src = `images/${pId}/banner.jpg`;
            document.getElementById('banner-text').innerText = `>_ ${pId === 'freren' ? '葬送的芙莉蓮' : '實力至上教室'}`;
        };

        function refreshInventory() {
            const area = document.getElementById('inventory-display');
            area.innerHTML = '';
            const inv = userData.inventory || [];
            const counts = {};
            inv.forEach(x => counts[x] = (counts[x] || 0) + 1);

            ['sss', 'ss', 's', 'a', 'b', 'c', 'd'].forEach(r => {
                const pool = poolSettings[currentPoolId][r];
                if (!pool) return;
                let html = `<div style="color:#fff; font-size:12px; margin:15px 0 10px; border-left:3px solid #00ffcc; padding-left:8px">${r.toUpperCase()} 級</div><div class="backpack-grid">`;
                pool.forEach((file, i) => {
                    const id = `${currentPoolId}_${r}_${i}`;
                    const count = counts[id] || 0;
                    html += `
                        <div class="mini-card ${count === 0 ? 'locked' : ''}">
                            ${count > 1 ? `<div style="position:absolute;top:2px;right:2px;background:#ff0055;color:#fff;font-size:9px;padding:1px 4px;border-radius:10px;z-index:2">x${count}</div>` : ''}
                            <img src="images/${currentPoolId}/${file}">
                            <div class="mini-rank">${r.toUpperCase()}</div>
                        </div>`;
                });
                area.innerHTML += html + `</div>`;
            });
        }
    </script>
</body>
</html>
