<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: TCG V27 - 終極圖鑑與登入閘門</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; }
        #app { width: 100%; max-width: 400px; height: 100%; background: #050505; position: relative; display: flex; flex-direction: column; border: 1px solid #222; }
        
        /* === 獵人公會登入閘門 === */
        #login-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        .sys-title { color: #00ffcc; font-size: 24px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,255,204,0.5); letter-spacing: 2px; }
        .sys-sub { color: #555; font-size: 12px; margin-bottom: 40px; letter-spacing: 5px; }
        .log-input { width: 100%; padding: 15px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; font-size: 14px; transition: 0.3s; }
        .log-input:focus { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.2); }
        .log-btn { width: 100%; padding: 15px; background: #00ffcc; color: #000; font-weight: bold; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .log-btn:active { transform: scale(0.95); }

        /* === 遊戲主體 UI === */
        .top-bar { height: 60px; border-bottom: 2px solid #00ffcc; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0,0,0,0.9); z-index: 10; }
        .p-info { display: flex; flex-direction: column; }
        .logout-btn { color: #ff0055; font-size: 10px; background: none; border: 1px solid #ff0055; border-radius: 4px; padding: 2px 6px; margin-top: 4px; cursor: pointer; width: fit-content; }
        .gold-ui { background: rgba(255,215,0,0.1); border: 1px solid #ffd700; padding: 5px 12px; border-radius: 20px; color: #fff; font-weight: bold; font-size: 14px; }
        
        .main-view { flex: 1; overflow-y: auto; padding: 15px; position: relative; }
        .pool-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: #111; color: #666; border: 1px solid #333; padding: 10px; text-align: center; font-weight: bold; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .tab-btn.active { background: rgba(0,255,204,0.1); color: #00ffcc; border-color: #00ffcc; }
        .banner { width: 100%; height: 180px; border-radius: 12px; margin-bottom: 20px; position: relative; overflow: hidden; border: 1px solid #333; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }
        
        .gacha-btns { display: flex; gap: 10px; }
        .g-btn { flex: 1; padding: 15px; background: #000; border: 2px solid #00ffcc; color: #00ffcc; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .g-btn span { display: block; font-size: 10px; opacity: 0.7; }
        
        .m-card { background: #111; border: 1px solid #333; border-left: 4px solid #00ffcc; padding: 15px; margin-bottom: 12px; border-radius: 6px; }
        .m-btn { width: 100%; margin-top: 10px; padding: 10px; background: #00ffcc; color: #000; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .m-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* === 抽卡特效層 === */
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; display:none; flex-direction:column; justify-content:center; align-items:center; perspective: 1200px; }
        .stack { position: relative; width: 220px; height: 320px; }
        .card-w { position: absolute; top:0; left:0; width:100%; height:100%; transition: 0.6s; cursor: pointer; }
        .card-i { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: 0.8s; }
        .card-i.flipped { transform: rotateY(180deg) scale(1.05); }
        .face { position: absolute; width:100%; height:100%; backface-visibility: hidden; border-radius: 12px; overflow: hidden; border: 3px solid #333; }
        .back { background: radial-gradient(circle at center, #222 0%, #050505 100%); display: flex; justify-content: center; align-items: center; border-color: #00ffcc; box-shadow: inset 0 0 15px rgba(0,255,204,0.3); }
        .back::after { content: 'SL'; color: rgba(0, 255, 204, 0.4); font-size: 50px; font-weight: 900; font-family: sans-serif; letter-spacing: 5px; }
        .front { transform: rotateY(180deg); background: #000; display: flex; flex-direction: column; }
        .front img { width: 100%; height: 260px; object-fit: cover; }
        .r-banner { flex: 1; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; color: #fff; }
        @keyframes fly { 0% { opacity: 1; transform: rotateY(180deg) scale(1.05); } 20% { transform: rotateY(180deg) translateY(20px) scale(1.1); } 100% { transform: rotateY(180deg) translateY(-1200px) scale(0.5) rotate(15deg); opacity: 0; } }
        .dismissed { animation: fly 0.7s forwards; pointer-events: none; }
        
        .hidden { display: none !important; }
        .nav { height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; background: #0a0a0a; }
        .nav-i { color: #555; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-i.active { color: #00ffcc; }

        #pity-bar-wrap { margin-top: 14px; }
        #pity-bar-wrap label { font-size: 11px; color: #555; display: flex; justify-content: space-between; margin-bottom: 4px; }
        #pity-bar-track { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; border: 1px solid #222; }
        #pity-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #00ffcc, #aa00ff); transition: width 0.5s ease; }

        /* === 終極圖鑑 (含未解鎖黑影特效) === */
        #bag-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-top: 5px; }
        .bag-card { position: relative; border-radius: 10px; overflow: hidden; border: 2px solid #222; background: #111; aspect-ratio: 2/3; }
        .bag-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: 0.3s; }
        .bag-card .rarity-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 4px; text-align: center; font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.8); transition: 0.3s; }
        .bag-card .count-badge { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.85); border: 1px solid #ffd700; color: #ffd700; font-size: 10px; font-weight: bold; border-radius: 10px; padding: 2px 6px; }
        
        .bag-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .bag-header h2 { color: #00ffcc; font-size: 14px; }
        .bag-header span { font-size: 11px; color: #555; }

        /* 未解鎖的灰暗鎖定狀態 */
        .bag-card.locked { border-color: #1a1a1a !important; box-shadow: none !important; }
        .bag-card.locked img { filter: brightness(0.15) grayscale(100%); }
        .bag-card.locked .rarity-label { color: #444 !important; }
        .lock-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; opacity: 0.5; }

        .rarity-SSS { border-color: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.4); }
        .rarity-SSS .rarity-label { color: #ff0000; }
        .rarity-SS { border-color: #ff8800; box-shadow: 0 0 8px rgba(255,136,0,0.3); }
        .rarity-SS .rarity-label { color: #ff8800; }
        .rarity-S { border-color: #aa00ff; box-shadow: 0 0 6px rgba(170,0,255,0.3); }
        .rarity-S .rarity-label { color: #aa00ff; }
        .rarity-A { border-color: #ffd700; } .rarity-A .rarity-label { color: #ffd700; }
        .rarity-B { border-color: #00ffcc; } .rarity-B .rarity-label { color: #00ffcc; }
        .rarity-C { border-color: #555; } .rarity-C .rarity-label { color: #888; }
        .rarity-D { border-color: #333; } .rarity-D .rarity-label { color: #666; }
        .card-guaranteed .back { border-color: #ffd700 !important; box-shadow: 0 0 20px rgba(255,215,0,0.6); }
    </style>
</head>
<body>
    <div id="app">
        <!-- 登入閘門 (預設顯示，擋住遊戲) -->
        <div id="login-view">
            <div class="sys-title">SYSTEM_LOGIN</div>
            <div class="sys-sub">HUNTER ASSOCIATION TERMINAL</div>
            <input type="email" id="log-email" class="log-input" placeholder="登入信箱 (Email)">
            <input type="password" id="log-pw" class="log-input" placeholder="密碼 (Password)">
            <button class="log-btn" onclick="executeLogin()">連線登入</button>
            <p id="log-err" style="color:#ff0055; font-size:12px; margin-top:15px; display:none;">帳號或密碼錯誤！</p>
        </div>

        <div class="top-bar">
            <div class="p-info">
                <h1 id="p-id" style="color:#00ffcc; font-size:12px;">ID: ...</h1>
                <button class="logout-btn" onclick="executeLogout()">登出連線</button>
            </div>
            <div class="gold-ui">G: <span id="p-gold">0</span></div>
        </div>

        <div id="overlay">
            <div class="stack" id="stack"></div>
            <div id="hint" style="color:#888;margin-top:30px;">[ 點擊翻開卡包 ]</div>
        </div>

        <div class="main-view">
            <div id="page-gacha">
                <div class="pool-tabs">
                    <div class="tab-btn active" onclick="switchPool('freren', this)">芙莉蓮</div>
                    <div class="tab-btn" onclick="switchPool('elite', this)">實力至上</div>
                </div>
                <div class="banner">
                    <img id="b-img" src="images/freren/banner.jpg" onerror="this.src='https://via.placeholder.com/400x180/111/444'">
                    <div style="position:absolute; bottom:10px; left:10px; color:#fff; font-weight:bold;" id="b-txt">>_ 葬送的芙莉蓮</div>
                </div>
                <div class="gacha-btns">
                    <button class="g-btn" onclick="draw(1, 70)">單抽<span>70 G</span></button>
                    <button class="g-btn" style="border-color:#aa00ff; color:#aa00ff;" onclick="draw(5, 300)">五連<span>300 G</span></button>
                </div>
                <div id="pity-bar-wrap">
                    <label><span>🛡 保底進度 (滿50必中S以上)</span><span id="pity-text">0 / 50</span></label>
                    <div id="pity-bar-track"><div id="pity-bar-fill" style="width:0%"></div></div>
                </div>
            </div>

            <div id="page-mission" class="hidden"><div id="m-list"></div></div>
            <div id="page-bag" class="hidden">
                <div class="bag-header"><h2>🎒 我的圖鑑</h2><span id="bag-count">收集進度: 0 / 0</span></div>
                <div id="bag-list"></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-i active" onclick="tab('page-gacha', this)">🔮召喚</div>
            <div class="nav-i" onclick="tab('page-mission', this)">📜任務</div>
            <div class="nav-i" onclick="tab('page-bag', this)">🎒圖鑑</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        // 💡 換回正式的 Email 密碼登入與登出模組
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const config = { apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo", authDomain: "my-gacha-game-f7663.firebaseapp.com", projectId: "my-gacha-game-f7663", storageBucket: "my-gacha-game-f7663.firebasestorage.app", messagingSenderId: "1035192644413", appId: "1:1035192644413:web:1ad5337b9760a154cf8b54" };
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userRef = null;
        let uData = { gold: 0, inventory: [], pending: [], pity_count: 0 };
        let currentPool = 'freren';

        const pools = {
            'freren': { 
                sss: ['sss1.jpg'], ss: ['ss1.jpg'], s: ['s1.jpg', 's2.jpg', 's3.webp', 's4.jpg', 's5.jpg'], 
                a: ['a1.jpg', 'a2.jpg', 'a3.jpg', 'a5.jpg', 'a6.jpg'], b: ['b1.jpg', 'b2.jpg', 'b3.jpg', 'b4.jpg', 'b5.jpg', 'b6.jpg', 'b7.jpg', 'b8.jpg', 'b9.jpg'], 
                c: ['c1.jpg', 'c2.jpg', 'c3.jpg', 'c4.jpg', 'c5.jpg', 'c6.jpg', 'c7.jpg', 'c8.jpg', 'c9.jpg', 'c10.jpg'], d: ['d1.jpg', 'd2.jpg', 'd3.jpg', 'd4.jpg', 'd5.jpg', 'd6.jpg', 'd7.jpg', 'd8.jpg'] 
            },
            'elite': { sss: ['sss1.jpg'], ss: ['ss1.jpg'], s: ['s1.jpg'], a: ['a1.jpg'], b: ['b1.jpg'], c: ['c1.jpg'], d: ['d1.jpg'] }
        };
        const rates = [ {r:'d', p:0.4}, {r:'c', p:0.3}, {r:'b', p:0.18}, {r:'a', p:0.08}, {r:'s', p:0.03}, {r:'ss', p:0.008}, {r:'sss', p:0.002} ];

        // 💡 登入執行邏輯
        window.executeLogin = () => {
            const email = document.getElementById('log-email').value;
            const pw = document.getElementById('log-pw').value;
            document.getElementById('log-err').style.display = 'none';
            signInWithEmailAndPassword(auth, email, pw).catch(err => {
                document.getElementById('log-err').innerText = '❌ 登入失敗：請檢查帳號或密碼';
                document.getElementById('log-err').style.display = 'block';
            });
        };

        // 💡 登出執行邏輯
        window.executeLogout = () => {
            if(confirm('確定要登出連線嗎？')) {
                signOut(auth);
            }
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                // 登入成功：隱藏閘門，顯示遊戲
                document.getElementById('login-view').style.display = 'none';
                
                const id = u.email ? u.email.split('@')[0] : u.uid.substring(0, 8);
                document.getElementById('p-id').innerText = `ID: ${id}`;
                userRef = doc(db, "users", id);

                const snap = await getDoc(userRef);
                if (!snap.exists()) await setDoc(userRef, { gold: 500, inventory: [], pending: [], pity_count: 0 });

                onSnapshot(userRef, (s) => {
                    if (s.exists()) {
                        uData = s.data();
                        uData.pity_count = uData.pity_count || 0;
                        let rawInv = uData.inventory || [];
                        uData.inventory = rawInv.filter(item => item && typeof item === 'object' && item.id);
                        document.getElementById('p-gold').innerText = uData.gold || 0;
                        updatePityBar(uData.pity_count);
                        renderBag();
                    }
                });
                syncMissions();
            } else {
                // 未登入或登出：顯示閘門擋住畫面
                document.getElementById('login-view').style.display = 'flex';
                document.getElementById('log-pw').value = ''; // 清空密碼
            }
        });

        function updatePityBar(count) {
            const pity = Math.min(count, 50);
            document.getElementById('pity-text').innerText = `${pity} / 50`;
            document.getElementById('pity-bar-fill').style.width = `${(pity / 50) * 100}%`;
        }

        function syncMissions() {
            onSnapshot(doc(db, "config", "game_data"), (s) => {
                const list = document.getElementById('m-list');
                list.innerHTML = '<h2 style="color:#00ffcc;margin-bottom:15px">當前委託任務</h2>';
                const missions = s.exists() ? (s.data().missions || []) : [];
                if (missions.length === 0) return list.innerHTML += '<div style="color:#666; font-size:12px;">目前沒有可接取的任務。</div>';
                missions.forEach(m => {
                    const isP = uData.pending?.includes(m.id);
                    list.innerHTML += `<div class="m-card"><b>${m.title}</b><span style="float:right;color:#ffd700">+${m.reward} G</span><p style="font-size:12px;color:#666;margin-top:4px;">${m.desc}</p><button class="m-btn" onclick="rep('${m.id}')" ${isP ? 'disabled style="background:#333;cursor:not-allowed"' : ''}>${isP ? '審核中...' : '回報完成'}</button></div>`;
                });
            });
        }

        window.rep = async (id) => {
            await updateDoc(userRef, { pending: arrayUnion(id) });
            await setDoc(doc(db, "config", "game_data"), { reports: arrayUnion({ uid: auth.currentUser.email.split('@')[0], mid: id }) }, { merge: true });
            alert("回報成功！請等待後台審核發放。");
        };

        window.draw = async (n, p) => {
            if (uData.gold < p) return alert("金幣不足！請去接取任務。");
            let pityCount = uData.pity_count || 0;
            let results = [];
            let newPityCount = pityCount;

            for (let i = 0; i < n; i++) {
                let rank = 'd';
                let isGuaranteed = false;
                if (newPityCount >= 49) { rank = 's'; isGuaranteed = true; newPityCount = 0; } 
                else {
                    let rand = Math.random(), cum = 0;
                    for (let c of rates) { cum += c.p; if (rand <= cum) { rank = c.r; break; } }
                    if (['s', 'ss', 'sss'].includes(rank)) newPityCount = 0; else newPityCount++;
                }
                const files = pools[currentPool][rank];
                const file = files.length > 0 ? files[Math.floor(Math.random() * files.length)] : 'default.jpg';
                results.push({ rank, file, isGuaranteed, id: `${currentPool}_${rank}_${file}` });
            }

            const invMap = {};
            (uData.inventory || []).forEach(c => { invMap[c.id] = { ...c }; });
            results.forEach(card => {
                if (invMap[card.id]) { invMap[card.id].count = (invMap[card.id].count || 1) + 1; } 
                else { invMap[card.id] = { id: card.id, pool: currentPool, rarity: card.rank, img: `images/${currentPool}/${card.file}`, count: 1 }; }
            });

            await updateDoc(userRef, { gold: uData.gold - p, pity_count: newPityCount, inventory: Object.values(invMap) });
            startGacha(results);
        };

        function startGacha(cards) {
            const overlay = document.getElementById('overlay');
            const stack = document.getElementById('stack');
            overlay.style.display = 'flex';
            stack.innerHTML = '';
            let active = 0, rev = false;

            cards.reverse().forEach((card, i) => {
                const color = card.rank === 's' ? '#aa00ff' : (['ss', 'sss'].includes(card.rank) ? '#ff0000' : '#00ffcc');
                const w = document.createElement('div');
                w.className = 'card-w' + (card.isGuaranteed ? ' card-guaranteed' : '');
                w.style.zIndex = cards.length - i;
                w.style.transform = `translate(${i * 4}px, ${i * 4}px)`;
                
                w.innerHTML = `
                    <div class="card-i">
                        <div class="face back"></div> 
                        <div class="face front" style="border-color:${color}">
                            <img src="images/${currentPool}/${card.file}" onerror="this.src='https://via.placeholder.com/200x260/111/444'">
                            <div class="r-banner" style="background:${color}">${card.rank.toUpperCase()} ${card.isGuaranteed ? '<span style="color:#ffd700;font-size:10px;margin-left:5px;">⚡保底</span>' : ''}</div>
                        </div>
                    </div>`;

                w.onclick = () => {
                    if (i !== active) return;
                    if (!rev) {
                        rev = true;
                        document.querySelectorAll('#stack .card-i').forEach(el => el.classList.add('flipped'));
                        document.getElementById('hint').innerText = '[ 點擊逐張收取 ]';
                    } else {
                        w.style.pointerEvents = 'none'; 
                        w.firstChild.classList.add('dismissed');
                        active++;
                        if (active >= cards.length) setTimeout(() => { overlay.style.display = 'none'; document.getElementById('hint').innerText = '[ 點擊全翻 ]'; }, 750);
                    }
                };
                stack.appendChild(w);
            });
        }

        // 💡 終極圖鑑邏輯：顯示所有卡片，未解鎖的顯示黑影
        function renderBag() {
            const invMap = {};
            (uData.inventory || []).forEach(c => { invMap[c.id] = c; });
            const list = document.getElementById('bag-list');
            
            let html = '';
            let totalCards = 0;
            let unlockedCards = 0;
            const order = ['sss', 'ss', 's', 'a', 'b', 'c', 'd'];

            // 遍歷當前卡池的所有預設卡片
            order.forEach(r => {
                if(!pools[currentPool][r]) return;
                pools[currentPool][r].forEach(file => {
                    totalCards++;
                    const cardId = `${currentPool}_${r}_${file}`;
                    const ownedCard = invMap[cardId];
                    const isLocked = !ownedCard;
                    const count = ownedCard ? ownedCard.count : 0;
                    
                    if (!isLocked) unlockedCards++;

                    html += `
                        <div class="bag-card rarity-${r.toUpperCase()} ${isLocked ? 'locked' : ''}">
                            <img src="images/${currentPool}/${file}" onerror="this.src='https://via.placeholder.com/100x150/111/444'">
                            <div class="rarity-label">${isLocked ? '??? 級' : r.toUpperCase() + ' 級'}</div>
                            ${count > 1 ? `<div class="count-badge">x${count}</div>` : ''}
                            ${isLocked ? `<div class="lock-icon">🔒</div>` : ''}
                        </div>
                    `;
                });
            });

            document.getElementById('bag-count').innerText = `收集進度: ${unlockedCards} / ${totalCards}`;
            list.innerHTML = html;
        }

        window.switchPool = (pId, btn) => {
            currentPool = pId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('b-img').src = `images/${pId}/banner.jpg`;
            document.getElementById('b-txt').innerText = `>_ ${pId === 'freren' ? '葬送的芙莉蓮' : '實力至上教室'}`;
            // 切換卡池時重新渲染圖鑑
            if(!document.getElementById('page-bag').classList.contains('hidden')) renderBag();
        };

        window.tab = (id, b) => {
            ['page-gacha', 'page-mission', 'page-bag'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-i').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
            // 切換到圖鑑分頁時確保渲染
            if(id === 'page-bag') renderBag();
        };
    </script>
</body>
</html>
