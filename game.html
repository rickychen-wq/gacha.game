<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: TCG V28 - 深色科技毛玻璃版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; }
        #app { width: 100%; max-width: 400px; height: 100%; background: #050505; position: relative; display: flex; flex-direction: column; border: 1px solid #1a1a1a; }
        
        /* 登入閘門 - 科技深色系 */
        #login-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0f1318 0%, #000 100%); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        .sys-title { color: #00ffcc; font-size: 24px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 15px rgba(0,255,204,0.3); letter-spacing: 3px; }
        .sys-sub { color: #445566; font-size: 11px; margin-bottom: 40px; letter-spacing: 4px; }
        .log-input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(20,25,30,0.8); border: 1px solid #223344; color: #fff; border-radius: 4px; outline: none; font-size: 14px; transition: 0.3s; }
        .log-input:focus { border-color: #00ffcc; box-shadow: inset 0 0 10px rgba(0,255,204,0.1); }
        .log-btn { width: 100%; padding: 15px; background: rgba(0,255,204,0.1); color: #00ffcc; border: 1px solid #00ffcc; font-weight: bold; border-radius: 4px; font-size: 14px; cursor: pointer; margin-top: 10px; transition: 0.2s; letter-spacing: 2px; }
        .log-btn:active { background: #00ffcc; color: #000; }

        /* 遊戲主體 UI */
        .top-bar { height: 60px; border-bottom: 1px solid #112222; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(5,5,5,0.95); z-index: 10; }
        .p-info { display: flex; flex-direction: column; }
        .logout-btn { color: #880022; font-size: 10px; background: none; border: 1px solid #880022; border-radius: 2px; padding: 2px 6px; margin-top: 4px; cursor: pointer; width: fit-content; transition: 0.2s;}
        .logout-btn:hover { background: #880022; color: #000; }
        .gold-ui { background: rgba(255,200,0,0.05); border: 1px solid rgba(255,200,0,0.3); padding: 5px 12px; border-radius: 4px; color: #e6b800; font-weight: bold; font-size: 13px; }
        
        .main-view { flex: 1; overflow-y: auto; padding: 15px; position: relative; }
        .pool-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: #0a0a0a; color: #555; border: 1px solid #222; padding: 10px; text-align: center; font-weight: bold; border-radius: 4px; font-size: 12px; cursor: pointer; transition: 0.3s;}
        .tab-btn.active { background: rgba(0,255,204,0.05); color: #00ffcc; border-color: rgba(0,255,204,0.3); }
        .banner { width: 100%; height: 180px; border-radius: 4px; margin-bottom: 20px; position: relative; overflow: hidden; border: 1px solid #222; }
        .banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        .gacha-btns { display: flex; gap: 10px; }
        .g-btn { flex: 1; padding: 15px; background: #050505; border: 1px solid rgba(0,255,204,0.3); color: #00ffcc; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .g-btn span { display: block; font-size: 10px; opacity: 0.5; margin-top: 4px; }
        .g-btn:active { background: rgba(0,255,204,0.1); }
        
        .m-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-left: 3px solid rgba(0,255,204,0.5); padding: 15px; margin-bottom: 12px; border-radius: 4px; }
        .m-btn { width: 100%; margin-top: 10px; padding: 10px; background: rgba(0,255,204,0.1); color: #00ffcc; border: 1px solid rgba(0,255,204,0.3); font-weight: bold; border-radius: 2px; cursor: pointer; }
        .m-btn:disabled { background: #111; color: #444; border-color: #222; cursor: not-allowed; }

        /* ========================================= */
        /* 💎 抽卡特效層 (深色玻璃科技感大改版) */
        /* ========================================= */
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index:100; display:none; flex-direction:column; justify-content:center; align-items:center; perspective: 1200px; }
        .stack { position: relative; width: 220px; height: 320px; }
        .card-w { position: absolute; top:0; left:0; width:100%; height:100%; transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; }
        .card-i { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-i.flipped { transform: rotateY(180deg) scale(1.08); }
        
        /* 卡片主體邊框改成半透明微光 */
        .face { position: absolute; width:100%; height:100%; backface-visibility: hidden; border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        /* 卡背：深邃晶片與對角線反光 */
        .back { background: linear-gradient(135deg, #0a0a0a 0%, #000 100%); display: flex; justify-content: center; align-items: center; border: 1px solid rgba(0,255,204,0.15); box-shadow: inset 0 0 30px rgba(0,0,0,0.9); position: relative;}
        .back::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0) 100%); transform: rotate(45deg); pointer-events: none; }
        .back::after { content: 'SL'; color: rgba(255, 255, 255, 0.03); font-size: 50px; font-weight: 900; letter-spacing: 8px; }
        
        /* 正面：毛玻璃下緣條幅 */
        .front { transform: rotateY(180deg); background: #000; display: flex; flex-direction: column; }
        .front img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.9; }
        .r-banner { position: absolute; bottom: 0; left: 0; width: 100%; height: 45px; z-index: 2; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; letter-spacing: 4px; background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; }
        
        @keyframes fly { 0% { opacity: 1; transform: rotateY(180deg) scale(1.08); } 15% { transform: rotateY(180deg) translateY(10px) scale(1.1); } 100% { transform: rotateY(180deg) translateY(-1000px) scale(0.6) rotate(10deg); opacity: 0; filter: blur(5px); } }
        .dismissed { animation: fly 0.6s forwards; pointer-events: none; }
        
        .hidden { display: none !important; }
        .nav { height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; background: #050505; }
        .nav-i { color: #444; font-size: 11px; text-align: center; cursor: pointer; transition: 0.2s; letter-spacing: 1px;}
        .nav-i.active { color: #00ffcc; text-shadow: 0 0 8px rgba(0,255,204,0.3); }

        #sign-toast { position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(10,10,10,0.9); backdrop-filter: blur(5px); border: 1px solid rgba(255,215,0,0.3); border-radius: 4px; padding: 12px 20px; color: #e6b800; font-size: 13px; z-index: 200; text-align: center; opacity: 0; pointer-events: none; transition: 0.5s; }
        #sign-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #pity-bar-wrap { margin-top: 14px; }
        #pity-bar-wrap label { font-size: 10px; color: #666; display: flex; justify-content: space-between; margin-bottom: 6px; letter-spacing: 1px;}
        #pity-bar-track { width: 100%; height: 4px; background: #111; overflow: hidden; border-radius: 2px;}
        #pity-bar-fill { height: 100%; background: linear-gradient(90deg, #0055ff, #aa00ff); transition: width 0.5s ease; }

        /* 圖鑑暗色科技感優化 */
        #bag-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-top: 5px; }
        .bag-card { position: relative; border-radius: 2px; overflow: hidden; border: 1px solid #222; background: #0a0a0a; aspect-ratio: 2/3; }
        .bag-card img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.85; }
        .bag-card .rarity-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 4px; text-align: center; font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.8); letter-spacing: 1px; backdrop-filter: blur(2px); border-top: 1px solid rgba(255,255,255,0.05); }
        .bag-card .count-badge { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,200,0,0.4); color: #e6b800; font-size: 9px; border-radius: 2px; padding: 2px 4px; }
        
        .bag-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .bag-header h2 { color: #00ffcc; font-size: 13px; letter-spacing: 1px;}
        .bag-header span { font-size: 10px; color: #666; }

        /* 未解鎖的深邃黑影 (拔除醜鎖頭) */
        .bag-card.locked { border-color: #0a0a0a !important; box-shadow: none !important; }
        .bag-card.locked img { filter: brightness(0.08) grayscale(100%); opacity: 0.5; }
        .bag-card.locked .rarity-label { color: #333 !important; background: transparent; border: none;}

        /* ========================================= */
        /* 🎨 稀有度顏色重構：低調奢華呼吸燈 */
        /* ========================================= */
        @keyframes breathSSS { 0% { box-shadow: inset 0 0 10px rgba(179,0,59,0.3); } 50% { box-shadow: inset 0 0 30px rgba(179,0,59,0.7); } 100% { box-shadow: inset 0 0 10px rgba(179,0,59,0.3); } }
        
        .rarity-SSS { border-color: rgba(179,0,59,0.6) !important; animation: breathSSS 3s infinite ease-in-out; }
        .rarity-SSS .r-banner { color: #ff3366; text-shadow: 0 0 5px rgba(255,51,102,0.4); border-top-color: rgba(179,0,59,0.3); }
        .rarity-SSS .rarity-label { color: #ff3366; }
        
        .rarity-SS { border-color: rgba(204,102,0,0.4) !important; box-shadow: inset 0 0 15px rgba(204,102,0,0.2); }
        .rarity-SS .r-banner, .rarity-SS .rarity-label { color: #ff9933; }
        
        .rarity-S { border-color: rgba(102,0,204,0.4) !important; box-shadow: inset 0 0 15px rgba(102,0,204,0.2); }
        .rarity-S .r-banner, .rarity-S .rarity-label { color: #b266ff; }
        
        .rarity-A { border-color: rgba(153,122,0,0.3) !important; } .rarity-A .r-banner, .rarity-A .rarity-label { color: #ccaa00; }
        .rarity-B { border-color: rgba(0,128,153,0.3) !important; } .rarity-B .r-banner, .rarity-B .rarity-label { color: #00aacc; }
        .rarity-C { border-color: rgba(68,68,68,0.4) !important; } .rarity-C .r-banner, .rarity-C .rarity-label { color: #888888; }
        .rarity-D { border-color: rgba(26,26,26,0.5) !important; filter: grayscale(50%);} .rarity-D .r-banner, .rarity-D .rarity-label { color: #555555; }
        
        .card-guaranteed .back { border-color: rgba(204,153,0,0.5) !important; box-shadow: inset 0 0 25px rgba(204,153,0,0.3); }
    </style>
</head>
<body>
    <div id="app">
        <div id="login-view">
            <div class="sys-title">SYS_LOGIN</div>
            <div class="sys-sub">HUNTER ASSOCIATION</div>
            <input type="email" id="log-email" class="log-input" placeholder="User Email">
            <input type="password" id="log-pw" class="log-input" placeholder="Password">
            <button class="log-btn" onclick="executeLogin()">ACCESS</button>
            <p id="log-err" style="color:#aa0033; font-size:11px; margin-top:15px; display:none;">ACCESS DENIED</p>
        </div>

        <div class="top-bar">
            <div class="p-info">
                <h1 id="p-id" style="color:#00ffcc; font-size:11px; letter-spacing:1px;">ID: ...</h1>
                <button class="logout-btn" onclick="executeLogout()">LOGOUT</button>
            </div>
            <div class="gold-ui">G: <span id="p-gold">0</span></div>
        </div>

        <div id="sign-toast">
            系統配給已發放<div style="font-size:10px;color:#00ffcc;margin-top:4px;">+50 G</div>
        </div>

        <div id="overlay">
            <div class="stack" id="stack"></div>
            <div id="hint" style="color:#666;margin-top:40px; font-size:12px; letter-spacing:2px;">[ 點擊解析資料庫 ]</div>
        </div>

        <div class="main-view">
            <div id="page-gacha">
                <div class="pool-tabs">
                    <div class="tab-btn active" onclick="switchPool('freren', this)">芙莉蓮</div>
                    <div class="tab-btn" onclick="switchPool('elite', this)">實力至上</div>
                </div>
                <div class="banner">
                    <img id="b-img" src="images/freren/banner.jpg" onerror="this.src='https://via.placeholder.com/400x180/111/444'">
                    <div style="position:absolute; bottom:10px; left:10px; color:#fff; font-size: 13px; font-weight:bold; letter-spacing:1px;" id="b-txt">> 葬送的芙莉蓮</div>
                </div>
                <div class="gacha-btns">
                    <button class="g-btn" onclick="draw(1, 70)">單抽<span>70 G</span></button>
                    <button class="g-btn" style="border-color:rgba(153,0,255,0.4); color:#b266ff;" onclick="draw(5, 300)">五連<span>300 G</span></button>
                </div>
                <div id="pity-bar-wrap">
                    <label><span>🛡 S級保底進度</span><span id="pity-text">0 / 50</span></label>
                    <div id="pity-bar-track"><div id="pity-bar-fill" style="width:0%"></div></div>
                </div>
            </div>

            <div id="page-mission" class="hidden"><div id="m-list"></div></div>
            <div id="page-bag" class="hidden">
                <div class="bag-header"><h2>🎒 ARCHIVE</h2><span id="bag-count">0 / 0</span></div>
                <div id="bag-list"></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-i active" onclick="tab('page-gacha', this)">召喚</div>
            <div class="nav-i" onclick="tab('page-mission', this)">任務</div>
            <div class="nav-i" onclick="tab('page-bag', this)">圖鑑</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const config = { apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo", authDomain: "my-gacha-game-f7663.firebaseapp.com", projectId: "my-gacha-game-f7663", storageBucket: "my-gacha-game-f7663.firebasestorage.app", messagingSenderId: "1035192644413", appId: "1:1035192644413:web:1ad5337b9760a154cf8b54" };
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userRef = null;
        let uData = { gold: 0, inventory: [], pending: [], pity_count: 0 };
        let currentPool = 'freren';

        const pools = {
            'freren': { 
                sss: ['sss1.jpg'], ss: ['ss1.jpg'], s: ['s1.jpg', 's2.jpg', 's3.webp', 's4.jpg', 's5.jpg'], 
                a: ['a1.jpg', 'a2.jpg', 'a3.jpg', 'a5.jpg', 'a6.jpg'], b: ['b1.jpg', 'b2.jpg', 'b3.jpg', 'b4.jpg', 'b5.jpg', 'b6.jpg', 'b7.jpg', 'b8.jpg', 'b9.jpg'], 
                c: ['c1.jpg', 'c2.jpg', 'c3.jpg', 'c4.jpg', 'c5.jpg', 'c6.jpg', 'c7.jpg', 'c8.jpg', 'c9.jpg', 'c10.jpg'], d: ['d1.jpg', 'd2.jpg', 'd3.jpg', 'd4.jpg', 'd5.jpg', 'd6.jpg', 'd7.jpg', 'd8.jpg'] 
            },
            'elite': { sss: ['sss1.jpg'], ss: ['ss1.jpg'], s: ['s1.jpg'], a: ['a1.jpg'], b: ['b1.jpg'], c: ['c1.jpg'], d: ['d1.jpg'] }
        };
        const rates = [ {r:'d', p:0.4}, {r:'c', p:0.3}, {r:'b', p:0.18}, {r:'a', p:0.08}, {r:'s', p:0.03}, {r:'ss', p:0.008}, {r:'sss', p:0.002} ];

        window.executeLogin = () => {
            const email = document.getElementById('log-email').value;
            const pw = document.getElementById('log-pw').value;
            document.getElementById('log-err').style.display = 'none';
            signInWithEmailAndPassword(auth, email, pw).catch(err => {
                document.getElementById('log-err').style.display = 'block';
            });
        };

        window.executeLogout = () => { if(confirm('確定要登出連線嗎？')) signOut(auth); };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                document.getElementById('login-view').style.display = 'none';
                const id = u.email.split('@')[0];
                document.getElementById('p-id').innerText = `ID: ${id}`;
                userRef = doc(db, "users", id);

                const snap = await getDoc(userRef);
                if (!snap.exists()) await setDoc(userRef, { gold: 500, inventory: [], pending: [], pity_count: 0 });

                onSnapshot(userRef, (s) => {
                    if (s.exists()) {
                        uData = s.data();
                        uData.pity_count = uData.pity_count || 0;
                        uData.inventory = (uData.inventory || []).filter(item => item && typeof item === 'object' && item.id);
                        document.getElementById('p-gold').innerText = Number(uData.gold) || 0; 
                        updatePityBar(uData.pity_count);
                        renderBag();
                    }
                });
                syncMissions();
            } else {
                document.getElementById('login-view').style.display = 'flex';
                document.getElementById('log-pw').value = ''; 
            }
        });

        function updatePityBar(count) {
            const pity = Math.min(count, 50);
            document.getElementById('pity-text').innerText = `${pity} / 50`;
            document.getElementById('pity-bar-fill').style.width = `${(pity / 50) * 100}%`;
        }

        function syncMissions() {
            onSnapshot(doc(db, "config", "game_data"), (s) => {
                const list = document.getElementById('m-list');
                list.innerHTML = '<h2 style="color:#00ffcc;margin-bottom:15px; font-size:14px; letter-spacing:1px;">當前委託任務</h2>';
                const missions = s.exists() ? (s.data().missions || []) : [];
                if (missions.length === 0) return list.innerHTML += '<div style="color:#555; font-size:11px;">無待處理的委託紀錄。</div>';
                missions.forEach(m => {
                    const isP = uData.pending?.includes(m.id);
                    list.innerHTML += `<div class="m-card"><b style="color:#ddd;">${m.title}</b><span style="float:right;color:#e6b800">+${m.reward} G</span><p style="font-size:11px;color:#666;margin-top:6px;">${m.desc}</p><button class="m-btn" onclick="rep('${m.id}')" ${isP ? 'disabled style="background:#111;cursor:not-allowed"' : ''}>${isP ? '審核中...' : '回報完成'}</button></div>`;
                });
            });
        }

        window.rep = async (id) => {
            await updateDoc(userRef, { pending: arrayUnion(id) });
            await setDoc(doc(db, "config", "game_data"), { reports: arrayUnion({ uid: auth.currentUser.email.split('@')[0], mid: id }) }, { merge: true });
            alert("資料已上傳至協會，請等待審核。");
        };

        window.draw = async (n, cost) => {
            const currentGold = Number(uData.gold) || 0;
            if (currentGold < cost) return alert("系統配給不足！請完成委託任務。");
            
            let pityCount = uData.pity_count || 0;
            let results = [];
            let newPityCount = pityCount;

            for (let i = 0; i < n; i++) {
                let rank = 'd';
                let isGuaranteed = false;
                if (newPityCount >= 49) { rank = 's'; isGuaranteed = true; newPityCount = 0; } 
                else {
                    let rand = Math.random(), cum = 0;
                    for (let c of rates) { cum += c.p; if (rand <= cum) { rank = c.r; break; } }
                    if (['s', 'ss', 'sss'].includes(rank)) newPityCount = 0; else newPityCount++;
                }
                const files = pools[currentPool][rank];
                const file = files.length > 0 ? files[Math.floor(Math.random() * files.length)] : 'default.jpg';
                results.push({ rank, file, isGuaranteed, id: `${currentPool}_${rank}_${file}` });
            }

            const invMap = {};
            (uData.inventory || []).forEach(c => { invMap[c.id] = { ...c }; });
            results.forEach(card => {
                if (invMap[card.id]) { invMap[card.id].count = (invMap[card.id].count || 1) + 1; } 
                else { invMap[card.id] = { id: card.id, pool: currentPool, rarity: card.rank, img: `images/${currentPool}/${card.file}`, count: 1 }; }
            });

            await updateDoc(userRef, { gold: currentGold - cost, pity_count: newPityCount, inventory: Object.values(invMap) });
            startGacha(results);
        };

        function startGacha(cards) {
            const overlay = document.getElementById('overlay');
            const stack = document.getElementById('stack');
            overlay.style.display = 'flex';
            stack.innerHTML = '';
            let active = 0, rev = false;

            cards.reverse().forEach((card, i) => {
                const w = document.createElement('div');
                w.className = 'card-w' + (card.isGuaranteed ? ' card-guaranteed' : '');
                w.style.zIndex = cards.length - i;
                w.style.transform = `translate(${i * 4}px, ${i * 4}px)`;
                
                w.innerHTML = `
                    <div class="card-i">
                        <div class="face back"></div> 
                        <div class="face front rarity-${card.rank.toUpperCase()}">
                            <img src="images/${currentPool}/${card.file}" onerror="this.src='https://via.placeholder.com/200x260/111/444'">
                            <div class="r-banner">${card.rank.toUpperCase()} ${card.isGuaranteed ? '<span style="color:#ccaa00;font-size:10px;margin-left:5px;">⚡保底</span>' : ''}</div>
                        </div>
                    </div>`;

                w.onclick = () => {
                    if (i !== active) return;
                    if (!rev) {
                        rev = true;
                        document.querySelectorAll('#stack .card-i').forEach(el => el.classList.add('flipped'));
                        document.getElementById('hint').innerText = '[ 點擊進行數據回收 ]';
                    } else {
                        w.style.pointerEvents = 'none'; 
                        w.firstElementChild.classList.add('dismissed'); 
                        active++;
                        if (active >= cards.length) setTimeout(() => { overlay.style.display = 'none'; document.getElementById('hint').innerText = '[ 點擊解析資料庫 ]'; }, 750);
                    }
                };
                stack.appendChild(w);
            });
        }

        function renderBag() {
            const invMap = {};
            (uData.inventory || []).forEach(c => { invMap[c.id] = c; });
            const list = document.getElementById('bag-list');
            
            let html = '';
            let totalCards = 0;
            let unlockedCards = 0;
            const order = ['sss', 'ss', 's', 'a', 'b', 'c', 'd'];

            order.forEach(r => {
                if(!pools[currentPool][r]) return;
                pools[currentPool][r].forEach(file => {
                    totalCards++;
                    const cardId = `${currentPool}_${r}_${file}`;
                    const ownedCard = invMap[cardId];
                    const isLocked = !ownedCard;
                    const count = ownedCard ? ownedCard.count : 0;
                    
                    if (!isLocked) unlockedCards++;

                    html += `
                        <div class="bag-card rarity-${r.toUpperCase()} ${isLocked ? 'locked' : ''}">
                            <img src="images/${currentPool}/${file}" onerror="this.src='https://via.placeholder.com/100x150/111/444'">
                            <div class="rarity-label">${isLocked ? 'UNKNOWN' : r.toUpperCase()}</div>
                            ${count > 1 ? `<div class="count-badge">x${count}</div>` : ''}
                        </div>
                    `;
                });
            });

            document.getElementById('bag-count').innerText = `${unlockedCards} / ${totalCards}`;
            list.innerHTML = html;
        }

        window.switchPool = (pId, btn) => {
            currentPool = pId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('b-img').src = `images/${pId}/banner.jpg`;
            document.getElementById('b-txt').innerText = `> ARCHIVE: ${pId === 'freren' ? 'Frieren' : 'Classroom of the Elite'}`;
            if(!document.getElementById('page-bag').classList.contains('hidden')) renderBag();
        };

        window.tab = (id, b) => {
            ['page-gacha', 'page-mission', 'page-bag'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-i').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
            if(id === 'page-bag') renderBag();
        };
    </script>
</body>
</html>
