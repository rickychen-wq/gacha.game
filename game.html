<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: TCG Mobile V20</title>
    <style>
        /* ==========================================================================
           [1] 手遊版面核心設定 
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #000; display: flex; justify-content: center; align-items: center; 
            height: 100dvh; width: 100vw; overflow: hidden; user-select: none;
        }
        
        #app-container {
            width: 100%; max-width: 400px; height: 100%; max-height: 900px;
            background: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%);
            position: relative; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1); border-left: 1px solid #222; border-right: 1px solid #222;
        }

        .top-bar {
            height: 60px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #00ffcc;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 10;
        }
        .top-bar h1 { font-size: 16px; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.5); }
        .user-tag { background: rgba(255,0,85,0.2); color: #ff0055; padding: 4px 10px; font-size: 12px; font-weight: bold; border-radius: 4px; border: 1px solid #ff0055; }

        .main-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; position: relative; scroll-behavior: smooth; }
        
        .pool-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { 
            flex: 1; min-width: 120px; background: #111; color: #666; border: 1px solid #333; 
            padding: 10px; text-align: center; font-weight: bold; border-radius: 8px; transition: 0.3s; 
        }
        .tab-btn.active { background: rgba(0,255,204,0.1); color: #00ffcc; border-color: #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.2); }

        .bottom-nav {
            height: 70px; background: #0a0a0a; border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center; z-index: 10;
        }
        .nav-btn { color: #888; display: flex; flex-direction: column; align-items: center; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: #00ffcc; text-shadow: 0 0 8px rgba(0,255,204,0.5); transform: translateY(-3px); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }

        /* ==========================================================================
           [2] 抽卡大廳與按鈕
           ========================================================================== */
        .banner-area { width: 100%; height: 250px; background: #000; border: 2px solid #333; border-radius: 12px; margin-bottom: 30px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .banner-area img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .banner-text { position: absolute; bottom: 10px; left: 15px; font-size: 20px; font-weight: bold; color: #fff; text-shadow: 2px 2px 5px #000; }
        
        .gacha-actions { display: flex; gap: 15px; justify-content: center; }
        .action-btn { 
            flex: 1; background: linear-gradient(135deg, rgba(0,0,0,0.8), #111); border: 2px solid #00ffcc; 
            color: #00ffcc; font-size: 16px; font-weight: bold; padding: 18px 0; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,255,204,0.2); transition: 0.2s; 
        }
        .action-btn:active { transform: scale(0.95); }
        .btn-purple { border-color: #aa00ff; color: #aa00ff; box-shadow: 0 5px 15px rgba(170,0,255,0.2); }

        /* ==========================================================================
           [3] 寶可夢 TCG 拆卡包特效 (全息雷射 + 蓄力升天特效)
           ========================================================================== */
        #tcg-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; 
            perspective: 1200px;
        }
        #tcg-overlay.active { opacity: 1; pointer-events: auto; }
        .tcg-hint { color: #888; margin-top: 50px; font-size: 14px; letter-spacing: 2px; animation: pulse 1.5s infinite; text-align: center; }
        
        #card-stack-container { position: relative; width: 220px; height: 320px; margin-top: -50px;}
        
        .tcg-card-wrapper { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer;
        }
        .tcg-card-inner { 
            width: 100%; height: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border-radius: 12px;
        }
        
        /* 翻牌狀態 */
        .tcg-card-inner.is-flipped { transform: rotateY(180deg) scale(1.05); box-shadow: 0 0 30px rgba(0,255,204,0.3); }
        
        /* ✨ 飛走(滑掉)狀態：全新升級的蓄力搖擺升天特效 ✨ */
        .tcg-card-inner.is-dismissed { animation: fly-away 0.7s cubic-bezier(0.5, -0.5, 0.2, 1.5) forwards; }

        @keyframes fly-away {
            0%   { transform: rotateY(180deg) scale(1.05); opacity: 1; }
            20%  { transform: rotateY(180deg) scale(1.1) translateY(20px) rotate(-5deg); } /* 往下沉蓄力 + 左傾 */
            40%  { transform: rotateY(180deg) scale(1.1) translateY(-10px) rotate(5deg); } /* 往上彈 + 右傾 */
            100% { transform: rotateY(180deg) scale(0.5) translateY(-1200px) rotate(25deg); opacity: 0; } /* 噴射升空消失 */
        }

        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 3px solid #333; overflow: hidden; }
        
        .card-back { 
            background: repeating-linear-gradient(45deg, #0a0a0a, #0a0a0a 10px, #1a1a1a 10px, #1a1a1a 20px); 
            display: flex; justify-content: center; align-items: center; border-color: #00ffcc;
        }
        .card-back::after { content: 'SECRET'; color: #00ffcc; font-weight: bold; font-size: 24px; letter-spacing: 5px; transform: rotate(-45deg); border: 2px solid #00ffcc; padding: 5px 10px; }
        
        .card-front { transform: rotateY(180deg); background: #000; display: flex; flex-direction: column; position: relative; }
        .card-front img { width: 100%; height: 260px; object-fit: cover; position: relative; z-index: 1; }
        .card-front .rank-banner { flex: 1; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; position: relative; z-index: 1; background: #000; }

        /* 史詩級卡片專屬視覺特效 */
        .tcg-card-inner.legendary.is-flipped { 
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 80px rgba(255, 0, 85, 0.5); 
            animation: legendary-float 2s infinite ease-in-out;
        }
        .tcg-card-inner.legendary.is-flipped .card-front::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.7) 25%, transparent 30%, rgba(255,215,0,0.6) 50%, transparent 55%);
            background-size: 300% 300%; animation: holo-sweep 3s infinite linear; mix-blend-mode: color-dodge;
            z-index: 5; pointer-events: none;
        }

        @keyframes legendary-float {
            0%, 100% { transform: rotateY(180deg) scale(1.05) translateY(0); }
            50% { transform: rotateY(180deg) scale(1.05) translateY(-10px); }
        }
        @keyframes holo-sweep { 0% { background-position: 100% 100%; } 100% { background-position: 0% 0%; } }

        /* ==========================================================================
           [4] 手遊版 3 排網格圖鑑背包
           ========================================================================== */
        .backpack-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .mini-card { width: 100%; aspect-ratio: 2/3; background: #000; border: 2px solid #333; position: relative; border-radius: 6px; overflow: hidden; }
        .mini-card img { width: 100%; height: 75%; object-fit: cover; filter: brightness(0.9); }
        .mini-card.locked img { filter: brightness(0.2) grayscale(1) blur(1px); }
        .mini-card .mini-rank { height: 25%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; background: #111; }
        
        .mini-card.locked .mini-rank { color: #444; }
        .mini-lock-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0055; font-size: 20px; text-shadow: 0 0 5px #000; }
        .mini-count { position: absolute; top: 4px; right: 4px; background: #ff0055; color: white; padding: 2px 6px; font-size: 10px; font-weight: bold; border-radius: 10px; }

        .rank-title { font-size: 16px; border-left: 4px solid #00ffcc; padding-left: 10px; margin-bottom: 15px; color: #fff; display: flex; justify-content: space-between; }
        .rank-title span { font-size: 12px; color: #00ffcc; align-self: flex-end; }
        
        .hidden { display: none !important; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="top-bar">
            <h1>TERMINAL V20</h1>
            <span class="user-tag" id="player-name">CHECKING...</span>
        </div>

        <div id="tcg-overlay">
            <div id="card-stack-container"></div>
            <div class="tcg-hint" id="tcg-hint-text">[ 點擊卡包，一鍵拆開所有卡片 ]</div>
        </div>

        <div class="main-scroll" id="main-view">
            <div id="gacha-view">
                <div class="pool-tabs">
                    <div class="tab-btn active" data-pool="freren">葬送的芙莉蓮</div>
                    <div class="tab-btn" data-pool="elite">實力至上教室</div>
                </div>
                <div class="banner-area">
                    <div class="banner-text">>_ DUNGEON STANDBY</div>
                </div>
                <div id="sys-message" style="color: #00ffcc; font-size: 12px; text-align: center; margin-bottom: 20px;">資料庫連線穩定，等待指令。</div>
                <div class="gacha-actions">
                    <button class="action-btn" id="btn-draw-1">單抽 (1x)</button>
                    <button class="action-btn btn-purple" id="btn-draw-5">連抽 (5x)</button>
                </div>
            </div>

            <div id="backpack-view" class="hidden">
                <div style="display:flex; justify-content:space-between; margin-bottom: 20px; align-items:center;">
                    <h2 style="color:#00ffcc; font-size:18px;">軍團圖鑑</h2>
                    <button id="btn-clear-backpack" style="background:transparent; border:1px solid #ff0055; color:#ff0055; padding:5px 10px; border-radius:4px; font-size:12px;">重置進度</button>
                </div>
                <div id="inventory-area"></div> 
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn active" id="nav-gacha">
                <div class="nav-icon">🔮</div>
                <div>召喚大廳</div>
            </div>
            <div class="nav-btn" id="nav-backpack">
                <div class="nav-icon">🎒</div>
                <div>圖鑑背包</div>
            </div>
            <div class="nav-btn" id="btn-logout">
                <div class="nav-icon">🔌</div>
                <div>中斷連結</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo",
            authDomain: "my-gacha-game-f7663.firebaseapp.com",
            projectId: "my-gacha-game-f7663",
            storageBucket: "my-gacha-game-f7663.firebasestorage.app",
            messagingSenderId: "1035192644413",
            appId: "1:1035192644413:web:1ad5337b9760a154cf8b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserDocRef = null;
        let currentPoolId = 'freren';

        const poolSettings = {
            'freren': { 
                sss: ['sss1.jpg'], ss:  ['ss1.jpg'], 
                s: ['s1.jpg', 's2.jpg', 's3.webp', 's4.jpg', 's5.jpg'],
                a: ['a1.jpg', 'a2.jpg', 'a3.jpg', 'a5.jpg', 'a6.jpg'],
                b: ['b1.jpg', 'b2.jpg', 'b3.jpg', 'b4.jpg', 'b5.jpg', 'b6.jpg', 'b7.jpg', 'b8.jpg', 'b9.jpg'],
                c: ['c1.jpg', 'c2.jpg', 'c3.jpg', 'c4.jpg', 'c5.jpg', 'c6.jpg', 'c7.jpg', 'c8.jpg', 'c9.jpg', 'c10.jpg'],
                d: ['d1.jpg', 'd2.jpg', 'd3.jpg', 'd4.jpg', 'd5.jpg', 'd6.jpg', 'd7.jpg', 'd8.jpg']
            },
            'elite': { sss:[], ss:[], s:[], a:[], b:[], c:[], d:[] }
        };

        const chances = [
            { r: 'd', p: 0.40 }, { r: 'c', p: 0.30 }, { r: 'b', p: 0.18 },  
            { r: 'a', p: 0.08 }, { r: 's', p: 0.03 }, { r: 'ss', p: 0.008 }, { r: 'sss', p: 0.002 }
        ];
        const rankOrder = ['sss', 'ss', 's', 'a', 'b', 'c', 'd'];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const id = user.email.split('@')[0];
                currentUserDocRef = doc(db, "users", id);
                document.getElementById('player-name').innerText = `ID: ${id}`;
            } else { 
                window.location.href = "index.html"; 
            }
        });

        function generateCardId(pId) {
            let rand = Math.random(), cum = 0, rank = 'd';
            for (let c of chances) { cum += c.p; if (rand <= cum) { rank = c.r; break; } }
            const imgArray = poolSettings[pId][rank] || [];
            const index = imgArray.length > 0 ? Math.floor(Math.random() * imgArray.length) : 0;
            return `${pId}_${rank}_${index}`;
        }

        function getCardDetails(fullId) {
            const [pool, rank, index] = fullId.split('_');
            let fileName = 'locked.png';
            if (poolSettings[pool] && poolSettings[pool][rank] && poolSettings[pool][rank][index]) {
                fileName = poolSettings[pool][rank][index];
            }
            return { pool, rank, src: `images/${pool}/${fileName}` };
        }

        // ==========================================
        // 🎴 V20 終極卡包：修復實體碰撞與新增飛天特效
        // ==========================================
        async function performTCGGacha(times) {
            const overlay = document.getElementById('tcg-overlay');
            const stackContainer = document.getElementById('card-stack-container');
            const hintText = document.getElementById('tcg-hint-text');
            
            overlay.classList.add('active');
            stackContainer.innerHTML = '';
            hintText.innerText = "[ 點擊卡包，一鍵拆開所有卡片 ]";

            let generatedIds = [];
            let hasLegendary = false;
            for(let i=0; i<times; i++) {
                const id = generateCardId(currentPoolId);
                generatedIds.push(id);
                if(['s', 'ss', 'sss'].includes(id.split('_')[1])) hasLegendary = true;
            }

            let activeCardIndex = 0; 
            let cardsRevealed = false; 

            for(let i = times - 1; i >= 0; i--) {
                const details = getCardDetails(generatedIds[i]);
                const wrapper = document.createElement('div');
                wrapper.className = 'tcg-card-wrapper';
                const offset = i * 4; 
                wrapper.style.transform = `translate(${offset}px, ${offset}px)`;
                wrapper.style.zIndex = times - i; 

                let rankColor = '#555';
                if(details.rank==='a'||details.rank==='b') rankColor = '#aa00ff';
                if(details.rank==='s') rankColor = '#ff0055';
                if(['ss','sss'].includes(details.rank)) rankColor = '#ffd700';

                const isLegendaryClass = ['s', 'ss', 'sss'].includes(details.rank) ? 'legendary' : '';

                wrapper.innerHTML = `
                    <div class="tcg-card-inner ${isLegendaryClass}">
                        <div class="card-face card-back"></div>
                        <div class="card-face card-front" style="border-color: ${rankColor}; box-shadow: inset 0 0 20px ${rankColor};">
                            <img src="${details.src}" onerror="this.src='https://via.placeholder.com/200x300/111/00ffcc?text=MISSING'">
                            <div class="rank-banner" style="color: ${rankColor};">${details.rank} 級</div>
                        </div>
                    </div>
                `;

                wrapper.onclick = () => {
                    if (i !== activeCardIndex) return; 

                    if (!cardsRevealed) {
                        cardsRevealed = true;
                        hintText.innerText = "[ 點擊卡片將其收下 ]";
                        
                        document.querySelectorAll('.tcg-card-inner').forEach(inner => {
                            inner.classList.add('is-flipped');
                        });

                        if (navigator.vibrate) {
                            if (hasLegendary) navigator.vibrate([100, 50, 100, 50, 300]);
                            else navigator.vibrate(50);
                        }
                    } else {
                        const inner = wrapper.querySelector('.tcg-card-inner');
                        inner.classList.add('is-dismissed');
                        
                        // 🚀 關鍵修復：把飛走卡片的碰撞實體關掉，讓點擊能穿透到下一張
                        wrapper.style.pointerEvents = 'none'; 
                        
                        activeCardIndex++;
                        
                        if (navigator.vibrate) navigator.vibrate(30);

                        if (activeCardIndex >= times) {
                            setTimeout(() => finishGachaProcess(generatedIds), 800); // 等待飛天動畫跑完
                        }
                    }
                };
                stackContainer.appendChild(wrapper);
            }
        }

        async function finishGachaProcess(results) {
            document.getElementById('tcg-overlay').classList.remove('active');
            const sysMessage = document.getElementById('sys-message');
            try {
                const docSnap = await getDoc(currentUserDocRef);
                const currentInv = (docSnap.exists() && docSnap.data().inventory) ? docSnap.data().inventory : [];
                await setDoc(currentUserDocRef, { inventory: currentInv.concat(results) }, { merge: true });
                sysMessage.innerText = `[成功] 獲得 ${results.length} 名新戰力！`;
            } catch (error) { sysMessage.innerText = "[錯誤] 資料庫無法同步。"; }
        }

        async function loadBackpack() {
            const invArea = document.getElementById('inventory-area');
            invArea.innerHTML = '<p style="text-align:center; color:#666;">載入資料中...</p>';

            try {
                const docSnap = await getDoc(currentUserDocRef);
                const inv = (docSnap.exists() && docSnap.data().inventory) ? docSnap.data().inventory : [];
                const stackedInv = {}; 
                const unlockedRanks = { sss:0, ss:0, s:0, a:0, b:0, c:0, d:0 };
                
                inv.forEach(id => {
                    stackedInv[id] = (stackedInv[id] || 0) + 1;
                    if (stackedInv[id] === 1) unlockedRanks[id.split('_')[1]]++;
                });

                let htmlContent = '';
                rankOrder.forEach(r => {
                    const poolArr = poolSettings[currentPoolId][r];
                    if (!poolArr || poolArr.length === 0) return;
                    const total = poolArr.length;
                    const unlocked = unlockedRanks[r];

                    htmlContent += `<div class="rank-title">${r.toUpperCase()} 級 <span>[ ${unlocked} / ${total} ]</span></div><div class="backpack-grid">`;

                    for (let i = 0; i < total; i++) {
                        const id = `${currentPoolId}_${r}_${i}`;
                        const count = stackedInv[id] || 0;
                        const isLocked = count === 0;
                        const details = getCardDetails(id);
                        
                        htmlContent += `
                        <div class="mini-card ${isLocked ? 'locked' : ''}">
                            ${count > 1 ? `<div class="mini-count">x${count}</div>` : ''}
                            ${isLocked ? `<div class="mini-lock-icon">🔒</div>` : ''}
                            <img src="${details.src}" onerror="this.src='https://via.placeholder.com/150x220/111/00ffcc?text=X'">
                            <div class="mini-rank">${r.toUpperCase()}</div>
                        </div>`;
                    }
                    htmlContent += `</div>`;
                });
                invArea.innerHTML = htmlContent;
            } catch (error) { invArea.innerHTML = '<p style="color:#ff0055;">無法連結圖鑑庫。</p>'; }
        }

        document.getElementById('btn-draw-1').addEventListener('click', () => performTCGGacha(1));
        document.getElementById('btn-draw-5').addEventListener('click', () => performTCGGacha(5));

        document.getElementById('nav-gacha').addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-gacha').classList.add('active');
            document.getElementById('backpack-view').classList.add('hidden');
            document.getElementById('gacha-view').classList.remove('hidden');
        });

        document.getElementById('nav-backpack').addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-backpack').classList.add('active');
            document.getElementById('gacha-view').classList.add('hidden');
            document.getElementById('backpack-view').classList.remove('hidden');
            loadBackpack();
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPoolId = btn.dataset.pool;
            });
        });

        document.getElementById('btn-clear-backpack').addEventListener('click', async () => {
            if(confirm("確定要清空所有圖鑑嗎？")) {
                await setDoc(currentUserDocRef, { inventory: [] }, { merge: true });
                loadBackpack(); 
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => { 
            if(confirm("確定登出？")) signOut(auth).then(() => window.location.href = "index.html");
        });
    </script>
</body>
</html>
