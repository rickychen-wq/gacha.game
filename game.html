<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Solo_Leveling_System_v6_Stacking</title>
    <style>
        /* --- 核心版面鎖死 (防噴出牆) --- */
        * { box-sizing: border-box; }
        body { 
            background-color: #050505; color: #00ffcc; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; flex-direction: row; margin: 0; 
            height: 100vh; width: 100vw; overflow: hidden; 
        }

        /* --- 左側選單 --- */
        .sidebar { 
            width: 220px; min-width: 220px; background: #0a0a0a; 
            border-right: 2px solid #333; display: flex; flex-direction: column; 
            padding: 20px; gap: 10px; z-index: 10; 
        }
        .pool-btn { background: transparent; color: #555; border: 1px solid #222; padding: 15px; text-align: left; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .pool-btn.active { border-color: #00ffcc; color: #00ffcc; background: rgba(0, 255, 204, 0.1); }

        /* --- 右側區域 (捲軸只在內部) --- */
        .main-content { 
            flex: 1; height: 100vh; overflow-y: auto; overflow-x: hidden; 
            padding: 20px; background: radial-gradient(circle at center, #111 0%, #000 100%); 
            display: flex; justify-content: center; 
        }
        .container { width: 100%; max-width: 1050px; background: rgba(10, 10, 10, 0.9); padding: 25px; border: 1px solid #333; }

        /* --- 召喚動畫層 (原神感) --- */
        #gacha-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.5s;
        }
        #gacha-overlay.active { opacity: 1; pointer-events: auto; }
        .summon-beam { width: 5px; height: 100vh; position: absolute; top: -100vh; animation: beam-drop 0.8s ease-in forwards; box-shadow: 0 0 20px #00ffcc; background: #00ffcc; }
        .rare-gold { background: #ffd700; box-shadow: 0 0 40px #ffd700; }
        @keyframes beam-drop { 0% { top: -100vh; } 100% { top: 100vh; } }

        /* --- 卡片設計 --- */
        .display-area { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; padding: 20px; background: #000; }
        .card { 
            width: 135px; height: 200px; background: #111; border: 2px solid #333; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
        }
        .card img { width: 100%; height: 155px; object-fit: cover; }
        .card .card-rank { flex: 1; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 13px; background: #050505; }
        
        /* 重複數量標記 (xN) */
        .card-count {
            position: absolute; top: 5px; right: 5px;
            background: rgba(255, 0, 85, 0.8); color: white;
            padding: 2px 8px; font-size: 12px; font-weight: bold; border-radius: 10px;
            box-shadow: 0 0 5px #000; z-index: 5;
        }

        .rank-s { border-color: #ff0055; box-shadow: 0 0 10px #ff0055; }
        .rank-ss { border-color: #ffd700; box-shadow: 0 0 15px #ffd700; }
        .rank-sss { border-color: #fff; box-shadow: 0 0 25px #fff; }

        /* --- 統計面板 --- */
        .stats-panel { display: flex; flex-wrap: wrap; justify-content: space-around; gap: 10px; margin-bottom: 20px; padding: 15px; background: rgba(0, 255, 204, 0.05); border: 1px solid #222; }
        .stat-item { text-align: center; min-width: 65px; }
        .stat-val { font-size: 18px; font-weight: bold; color: #ff0055; display: block; }

        .btn { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; padding: 12px 25px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #00ffcc; color: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="gacha-overlay">
        <div id="beam-container"></div>
        <div id="reveal-area" style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;"></div>
        <button class="btn" id="btn-close-reveal" style="margin-top: 40px;">[ 點擊繼續 ]</button>
    </div>

    <div class="sidebar">
        <div class="sidebar-title">SYSTEM_V6</div>
        <button class="pool-btn active" data-pool="frieren">葬送的芙莉蓮</button>
        <button class="pool-btn" data-pool="elite">實力至上教室</button>
        <button class="pool-btn" data-pool="jujutsu">咒術迴戰</button>
        <div style="margin-top: auto;">
            <button class="btn" id="btn-go-backpack" style="width: 100%; border-color: #aa00ff; color: #aa00ff;">查看背包 (INV)</button>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <h2>
                <span id="system-title">>_ DUNGEON: FRIEREN</span>
                <span style="font-size: 12px; color: #ff0055;" id="player-id">ID: SYNCING...</span>
            </h2>
            <div id="sys-message">系統就緒。</div>

            <div id="gacha-view">
                <div class="display-area" id="draw-area"></div>
                <div style="margin-top: 20px; display: flex; gap: 15px;">
                    <button class="btn" id="btn-draw-1">單次召喚</button>
                    <button class="btn" id="btn-draw-5">五連召喚</button>
                </div>
            </div>

            <div id="backpack-view" class="hidden">
                <div class="stats-panel" id="army-stats"></div>
                <div class="display-area" id="inventory-area"></div>
                <button class="btn" id="btn-go-gacha" style="margin-top: 20px;"><< 返回</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo",
            authDomain: "my-gacha-game-f7663.firebaseapp.com",
            projectId: "my-gacha-game-f7663",
            storageBucket: "my-gacha-game-f7663.firebasestorage.app",
            messagingSenderId: "1035192644413",
            appId: "1:1035192644413:web:1ad5337b9760a154cf8b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserDocRef = null;
        let currentPoolId = 'frieren';

        const poolSettings = {
            'frieren': { f:1, e:20, d:10, c:5, b:3, a:2, s:1, ss:1, sss:1 },
            'elite':   { f:1, e:10, d:5, c:5, b:3, a:2, s:1, ss:1, sss:1 },
            'jujutsu': { f:1, e:15, d:8, c:5, b:4, a:3, s:1, ss:1, sss:1 }
        };

        const chances = [
            { r: 'f', p: 0.20 }, { r: 'e', p: 0.25 }, { r: 'd', p: 0.205 },
            { r: 'c', p: 0.17 }, { r: 'b', p: 0.13 }, { r: 'a', p: 0.025 },
            { r: 's', p: 0.015 }, { r: 'ss', p: 0.005 }, { r: 'sss', p: 0 }
        ];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const id = user.email.split('@')[0];
                currentUserDocRef = doc(db, "users", id);
                document.getElementById('player-id').innerText = `USER: ${id}`;
            } else { window.location.href = "index.html"; }
        });

        function generateCard(pId) {
            let rand = Math.random(), cum = 0, rank = 'f';
            for (let c of chances) { cum += c.p; if (rand <= cum) { rank = c.r; break; } }
            const num = Math.floor(Math.random() * poolSettings[pId][rank]) + 1;
            return `${pId}_${rank}_${num}`;
        }

        function getCardHTML(fullId, count = 1) {
            const [p, r, n] = fullId.split('_');
            const countTag = count > 1 ? `<div class="card-count">x${count}</div>` : '';
            return `<div class="card rank-${r}">
                ${countTag}
                <img src="images/${p}/${r}${n}.png" onerror="this.src='https://via.placeholder.com/130x145/000/00ffcc?text=DATA'">
                <div class="card-rank">${r.toUpperCase()}</div>
            </div>`;
        }

        async function performGacha(times) {
            const overlay = document.getElementById('gacha-overlay');
            const revealArea = document.getElementById('reveal-area');
            const beamContainer = document.getElementById('beam-container');
            const drawArea = document.getElementById('draw-area');

            revealArea.innerHTML = ''; beamContainer.innerHTML = '';
            overlay.classList.add('active');

            let results = [];
            let isGold = false;
            for(let i=0; i<times; i++) {
                const id = generateCard(currentPoolId);
                results.push(id);
                if (['s','ss','sss'].includes(id.split('_')[1])) isGold = true;
                revealArea.innerHTML += getCardHTML(id);
            }

            const beam = document.createElement('div');
            beam.className = `summon-beam ${isGold ? 'rare-gold' : ''}`;
            beamContainer.appendChild(beam);

            await updateDoc(currentUserDocRef, { inventory: arrayUnion(...results) });
            drawArea.innerHTML = results.map(id => getCardHTML(id)).join('');
        }

        async function loadBackpack() {
            const invArea = document.getElementById('inventory-area');
            const statArea = document.getElementById('army-stats');
            invArea.innerHTML = '';
            const docSnap = await getDoc(currentUserDocRef);
            if (docSnap.exists()) {
                const inv = docSnap.data().inventory || [];
                
                // --- 核心邏輯：統計重複卡片 ---
                const stackedInv = {}; // { 'frieren_e1': 5, 'elite_s1': 1 }
                const rankCounts = { f:0, e:0, d:0, c:0, b:0, a:0, s:0, ss:0, sss:0 };

                inv.forEach(id => {
                    stackedInv[id] = (stackedInv[id] || 0) + 1;
                    const r = id.split('_')[1];
                    if (rankCounts.hasOwnProperty(r)) rankCounts[r]++;
                });

                // 渲染背包卡片
                Object.keys(stackedInv).forEach(id => {
                    invArea.innerHTML += getCardHTML(id, stackedInv[id]);
                });

                // 渲染統計文字
                statArea.innerHTML = Object.keys(rankCounts).map(k => `
                    <div class="stat-item"><span class="stat-label">${k.toUpperCase()}</span><span class="stat-val">${rankCounts[k]}</span></div>
                `).join('');
            }
        }

        document.getElementById('btn-close-reveal').addEventListener('click', () => document.getElementById('gacha-overlay').classList.remove('active'));
        document.querySelectorAll('.pool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPoolId = btn.dataset.pool;
                document.getElementById('system-title').innerText = `>_ DUNGEON: ${currentPoolId.toUpperCase()}`;
                document.getElementById('backpack-view').classList.add('hidden');
                document.getElementById('gacha-view').classList.remove('hidden');
            });
        });

        document.getElementById('btn-draw-1').addEventListener('click', () => performGacha(1));
        document.getElementById('btn-draw-5').addEventListener('click', () => performGacha(5));
        document.getElementById('btn-go-backpack').addEventListener('click', () => {
            document.getElementById('gacha-view').classList.add('hidden');
            document.getElementById('backpack-view').classList.remove('hidden');
            loadBackpack();
        });
        document.getElementById('btn-go-gacha').addEventListener('click', () => {
            document.getElementById('backpack-view').classList.add('hidden');
            document.getElementById('gacha-view').classList.remove('hidden');
        });
    </script>
</body>
</html>
