<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: TCG V23 - Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; user-select: none; }
        #app { width: 100%; max-width: 400px; height: 100%; background: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%); position: relative; display: flex; flex-direction: column; border-left: 1px solid #222; border-right: 1px solid #222; }
        
        /* 頂部 UI */
        .top-bar { height: 60px; border-bottom: 2px solid #00ffcc; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0,0,0,0.9); z-index: 10; }
        .gold-ui { background: rgba(255,215,0,0.1); border: 1px solid #ffd700; padding: 5px 12px; border-radius: 20px; color: #fff; font-weight: bold; font-size: 14px; box-shadow: inset 0 0 10px rgba(255,215,0,0.2); }
        .pity-ui { font-size: 10px; color: #aaa; margin-top: 4px; text-align: right; }
        
        .main-view { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 15px; position: relative; }
        
        /* 抽卡與 Banner */
        .pool-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: #111; color: #666; border: 1px solid #333; padding: 10px; text-align: center; font-weight: bold; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .tab-btn.active { background: rgba(0,255,204,0.1); color: #00ffcc; border-color: #00ffcc; }
        .banner { width: 100%; height: 180px; border-radius: 12px; margin-bottom: 20px; position: relative; overflow: hidden; border: 2px solid #333; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }
        .gacha-btns { display: flex; gap: 10px; }
        .g-btn { flex: 1; padding: 15px; background: linear-gradient(135deg, rgba(0,0,0,0.8), #111); border: 2px solid #00ffcc; color: #00ffcc; border-radius: 10px; font-weight: bold; font-size: 15px; transition: 0.2s; cursor: pointer; }
        .g-btn:active { transform: scale(0.95); }
        .g-btn span { display: block; font-size: 10px; opacity: 0.8; margin-top: 3px; }
        
        /* 任務卡片 */
        .m-card { background: rgba(15,15,15,0.9); border: 1px solid #333; border-left: 4px solid #00ffcc; padding: 15px; margin-bottom: 12px; border-radius: 6px; }
        .m-btn { width: 100%; margin-top: 10px; padding: 10px; background: #00ffcc; color: #000; border: none; font-weight: bold; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .m-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        /* 圖鑑網格 */
        .bag-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .mini-card { width: 100%; aspect-ratio: 2/3; background: #111; border: 1px solid #333; border-radius: 5px; position: relative; overflow: hidden; }
        .mini-card img { width: 100%; height: 75%; object-fit: cover; }
        .mini-card.locked { opacity: 0.2; filter: grayscale(1); }
        .mini-rank { height: 25%; display: flex; justify-content: center; align-items: center; font-size: 10px; color: #fff; background: #222; }
        .badge { position: absolute; top: 3px; right: 3px; background: #ff0055; color: #fff; font-size: 10px; padding: 2px 5px; border-radius: 10px; font-weight: bold; z-index: 2; box-shadow: 0 0 5px #000; }
        
        /* TCG 飛天特效層 */
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:100; display:none; flex-direction:column; justify-content:center; align-items:center; perspective: 1200px; }
        .stack { position: relative; width: 220px; height: 320px; margin-top: -30px;}
        .card-w { position: absolute; top:0; left:0; width:100%; height:100%; transition: 0.6s; cursor: pointer; }
        .card-i { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: 0.8s; border-radius: 12px; }
        .card-i.flipped { transform: rotateY(180deg) scale(1.05); }
        .face { position: absolute; width:100%; height:100%; backface-visibility: hidden; border-radius: 12px; border: 3px solid #333; overflow: hidden; }
        .back { background: #111; display: flex; justify-content: center; align-items: center; border-color: #00ffcc; }
        .back::after { content: 'SL'; color: #00ffcc; font-size: 40px; font-weight: bold; opacity: 0.3; }
        .front { transform: rotateY(180deg); background: #000; display: flex; flex-direction: column; }
        .front img { width: 100%; height: 260px; object-fit: cover; }
        .front .r-banner { flex: 1; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; color: #fff; }
        @keyframes fly { 0% { opacity: 1; transform: rotateY(180deg) scale(1.05); } 20% { transform: rotateY(180deg) translateY(20px) scale(1.1); } 100% { transform: rotateY(180deg) translateY(-1200px) scale(0.5) rotate(15deg); opacity: 0; } }
        .dismissed { animation: fly 0.7s cubic-bezier(0.5, -0.5, 0.2, 1.5) forwards; pointer-events: none; }
        
        .hidden { display: none !important; }
        .nav { height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; background: #0a0a0a; z-index: 10; }
        .nav-i { color: #555; font-size: 11px; text-align: center; cursor: pointer; font-weight: bold; display: flex; flex-direction: column; align-items: center; }
        .nav-i.active { color: #00ffcc; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 頂部資訊 -->
        <div class="top-bar">
            <div>
                <h1 id="p-id" style="color:#00ffcc; font-size:14px; text-shadow: 0 0 5px rgba(0,255,204,0.5);">ID: 連線中...</h1>
                <div class="pity-ui">保底計數: <span id="pity-count">0</span>/50</div>
            </div>
            <div class="gold-ui">G: <span id="p-gold">0</span></div>
        </div>

        <!-- 抽卡特效層 -->
        <div id="overlay">
            <div class="stack" id="stack"></div>
            <div id="hint" style="color:#888; margin-top:30px; font-size:12px;">[ 點擊翻開卡包 ]</div>
        </div>

        <!-- 主畫面區 -->
        <div class="main-view">
            <!-- 召喚大廳 -->
            <div id="page-gacha">
                <div class="pool-tabs">
                    <div class="tab-btn active" onclick="switchPool('freren', this)">芙莉蓮</div>
                    <div class="tab-btn" onclick="switchPool('elite', this)">實力至上</div>
                </div>
                <div class="banner">
                    <img id="b-img" src="images/freren/banner.jpg" onerror="this.src='https://via.placeholder.com/400x180/111/444?text=BANNER'">
                    <div style="position:absolute; bottom:10px; left:10px; color:#fff; font-weight:bold; font-size:18px; text-shadow: 0 2px 4px #000;" id="b-txt">>_ 葬送的芙莉蓮</div>
                </div>
                <div class="gacha-btns">
                    <button class="g-btn" onclick="executeDraw(1, 70)">單抽<span>70 G</span></button>
                    <button class="g-btn" style="border-color:#aa00ff; color:#aa00ff;" onclick="executeDraw(5, 300)">五連抽<span>300 G</span></button>
                </div>
            </div>

            <!-- 任務系統 -->
            <div id="page-mission" class="hidden">
                <h2 style="color:#00ffcc; font-size:16px; margin-bottom:15px; border-left:4px solid #00ffcc; padding-left:10px;">每日委託</h2>
                <div id="m-list"></div>
            </div>

            <!-- 圖鑑背包 -->
            <div id="page-bag" class="hidden">
                <h2 style="color:#00ffcc; font-size:16px; margin-bottom:15px;">軍團圖鑑 (自動堆疊)</h2>
                <div id="bag-list"></div>
            </div>
        </div>

        <!-- 底部導航 -->
        <div class="nav">
            <div class="nav-i active" onclick="switchTab('page-gacha', this)"><div class="nav-icon">🔮</div>召喚</div>
            <div class="nav-i" onclick="switchTab('page-mission', this)"><div class="nav-icon">📜</div>任務</div>
            <div class="nav-i" onclick="switchTab('page-bag', this)"><div class="nav-icon">🎒</div>圖鑑</div>
        </div>
    </div>

    <!-- Firebase 與核心邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const config = { apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo", authDomain: "my-gacha-game-f7663.firebaseapp.com", projectId: "my-gacha-game-f7663", storageBucket: "my-gacha-game-f7663.firebasestorage.app", messagingSenderId: "1035192644413", appId: "1:1035192644413:web:1ad5337b9760a154cf8b54" };
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let userRef = null, uData = { gold: 0, inventory: [], pending: [], pityCount: 0, lastLogin: "" };
        let currentPool = 'freren';

        // 假資料池 (確保你本地有這些圖片，或自行修改檔名)
        const pools = {
            'freren': { sss: ['sss1.jpg'], ss: ['ss1.jpg'], s: ['s1.jpg','s2.jpg'], a: ['a1.jpg','a2.jpg'], b: ['b1.jpg','b2.jpg'], c: ['c1.jpg','c2.jpg'], d: ['d1.jpg','d2.jpg'] },
            'elite': { sss: ['sss1.jpg'], ss: ['ss1.jpg'], s: ['s1.jpg'], a: ['a1.jpg'], b: ['b1.jpg'], c: ['c1.jpg'], d: ['d1.jpg'] }
        };
        const rates = [ {r:'d', p:0.4}, {r:'c', p:0.3}, {r:'b', p:0.18}, {r:'a', p:0.08}, {r:'s', p:0.03}, {r:'ss', p:0.008}, {r:'sss', p:0.002} ];

        // ==========================================
        // 初始化與每日簽到
        // ==========================================
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                const id = u.email.split('@')[0];
                document.getElementById('p-id').innerText = `ID: ${id}`;
                userRef = doc(db, "users", id);
                
                // 初次讀取觸發簽到檢查
                const snap = await getDoc(userRef);
                const today = new Date().toLocaleDateString();
                
                if (snap.exists()) {
                    let data = snap.data();
                    if (data.lastLogin !== today) {
                        data.gold = (data.gold || 0) + 50;
                        data.lastLogin = today;
                        await updateDoc(userRef, { gold: data.gold, lastLogin: today });
                        alert("🎉 每日簽到成功！獲得 50 G");
                    }
                } else {
                    await setDoc(userRef, { gold: 500, inventory: [], pending: [], pityCount: 0, lastLogin: today });
                    alert("🎉 歡迎來到 Solo Leveling！新兵入伍獲得 500 G");
                }

                // 實時監聽
                onSnapshot(userRef, (s) => {
                    uData = s.data();
                    document.getElementById('p-gold').innerText = uData.gold || 0;
                    document.getElementById('pity-count').innerText = uData.pityCount || 0;
                    if(!document.getElementById('page-bag').classList.contains('hidden')) renderBag();
                });
                syncMissions();
            } else { window.location.href = "index.html"; }
        });

        // ==========================================
        // 任務系統
        // ==========================================
        function syncMissions() {
            onSnapshot(doc(db, "config", "game_data"), (s) => {
                const list = document.getElementById('m-list');
                list.innerHTML = '';
                const mData = s.data()?.missions || [];
                if(mData.length === 0) list.innerHTML = '<div style="color:#666; font-size:12px;">目前沒有委託任務。</div>';
                
                mData.forEach(m => {
                    const isP = uData.pending?.includes(m.id);
                    list.innerHTML += `
                        <div class="m-card">
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                <b style="color:#fff;">${m.title}</b>
                                <span style="color:#ffd700; font-weight:bold;">+${m.reward} G</span>
                            </div>
                            <p style="font-size:12px; color:#888;">${m.desc}</p>
                            <button class="m-btn" onclick="reportM('${m.id}')" ${isP?'disabled':''}>${isP?'審核中...':'回報完成'}</button>
                        </div>`;
                });
            });
        }

        window.reportM = async (id) => {
            await updateDoc(userRef, { pending: arrayUnion(id) });
            await updateDoc(doc(db, "config", "game_data"), { reports: arrayUnion({ uid: auth.currentUser.email.split('@')[0], mid: id, time: Date.now() }) });
            alert("委託已回報，請等待管理員核發獎勵。");
        };

        // ==========================================
        // 抽卡核心 (保底 + 特效)
        // ==========================================
        window.executeDraw = async (times, price) => {
            if (uData.gold < price) return alert("❌ 金幣不足，請完成委託任務！");
            
            let currentPity = uData.pityCount || 0;
            let results = [];
            
            for(let i=0; i<times; i++) {
                let rank = 'd';
                // 保底觸發：滿 50 抽必中 S
                if (currentPity >= 49) {
                    rank = 's';
                    currentPity = 0;
                } else {
                    let rand = Math.random(), cum = 0;
                    for (let c of rates) { cum += c.p; if (rand <= cum) { rank = c.r; break; } }
                    if (['s', 'ss', 'sss'].includes(rank)) currentPity = 0;
                    else currentPity++;
                }
                
                const files = pools[currentPool][rank];
                const file = files.length > 0 ? files[Math.floor(Math.random() * files.length)] : 'placeholder.jpg';
                results.push({ rank, file, id: `${currentPool}_${rank}_${file}` });
            }

            // 扣錢與更新保底計數
            await updateDoc(userRef, { 
                gold: uData.gold - price, 
                pityCount: currentPity,
                inventory: arrayUnion(...results.map(r => r.id)) // 儲存完整 ID 用於計數
            });
            
            playGachaEffect(results, times);
        };

        function playGachaEffect(results, total) {
            const overlay = document.getElementById('overlay');
            const stack = document.getElementById('stack');
            const hint = document.getElementById('hint');
            overlay.style.display = 'flex';
            stack.innerHTML = '';
            hint.innerText = "[ 點擊翻開卡包 ]";
            
            let active = 0, revealed = false;
            
            results.reverse().forEach((res, i) => {
                const w = document.createElement('div');
                w.className = 'card-w'; 
                w.style.zIndex = total - i; 
                w.style.transform = `translate(${i*4}px, ${i*4}px)`;
                
                let color = res.rank === 's' ? '#ff0055' : (['ss', 'sss'].includes(res.rank) ? '#ffd700' : '#00ffcc');
                
                w.innerHTML = `
                    <div class="card-i">
                        <div class="face back"></div>
                        <div class="face front" style="border-color:${color}">
                            <img src="images/${currentPool}/${res.file}" onerror="this.src='https://via.placeholder.com/200x260/111/444?text=${res.rank}'">
                            <div class="r-banner" style="background:${color}">${res.rank.toUpperCase()}</div>
                        </div>
                    </div>`;
                    
                w.onclick = () => {
                    if (i !== active) return;
                    if (!revealed) { 
                        revealed = true; 
                        hint.innerText = "[ 點擊收下卡片 ]";
                        document.querySelectorAll('.card-i').forEach(el => el.classList.add('flipped')); 
                    } else { 
                        w.firstChild.classList.add('dismissed'); 
                        active++; 
                        if(active >= total) setTimeout(() => overlay.style.display = 'none', 600); 
                    }
                };
                stack.appendChild(w);
            });
        }

        // ==========================================
        // 圖鑑與UI切換 (卡片堆疊計數)
        // ==========================================
        function renderBag() {
            const area = document.getElementById('bag-list');
            area.innerHTML = '';
            const inv = uData.inventory || [];
            
            // 計算每張卡片的數量
            const counts = {};
            inv.forEach(id => counts[id] = (counts[id] || 0) + 1);

            ['sss', 'ss', 's', 'a', 'b', 'c', 'd'].forEach(r => {
                if(!pools[currentPool][r] || pools[currentPool][r].length === 0) return;
                
                let html = `<div style="color:#fff; font-size:12px; margin:15px 0 10px; border-left:3px solid #00ffcc; padding-left:8px">${r.toUpperCase()} 級</div><div class="bag-grid">`;
                
                pools[currentPool][r].forEach(file => {
                    const id = `${currentPool}_${r}_${file}`;
                    const count = counts[id] || 0;
                    
                    html += `
                        <div class="mini-card ${count === 0 ? 'locked' : ''}">
                            ${count > 1 ? `<div class="badge">x${count}</div>` : ''}
                            <img src="images/${currentPool}/${file}" onerror="this.src='https://via.placeholder.com/100x150/111/444'">
                            <div class="mini-rank">${r.toUpperCase()}</div>
                        </div>`;
                });
                area.innerHTML += html + `</div>`;
            });
        }

        window.switchTab = (id, btn) => {
            ['page-gacha', 'page-mission', 'page-bag'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-i').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'page-bag') renderBag();
        };

        window.switchPool = (pId, btn) => {
            currentPool = pId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('b-img').src = `images/${pId}/banner.jpg`;
            document.getElementById('b-txt').innerText = `>_ ${pId === 'freren' ? '葬送的芙莉蓮' : '實力至上教室'}`;
        };
    </script>
</body>
</html>
