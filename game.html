<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Solo_Leveling_System_Stable_v5.1</title>
    <style>
        /* --- 核心版面：絕對禁止橫向溢出 --- */
        * { box-sizing: border-box; } /* 確保邊框不會撐大容器 */

        body {
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: row;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* 全域禁止滾動 */
        }

        /* --- 左側選單 --- */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: #0a0a0a;
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
            z-index: 10;
        }

        .pool-btn {
            background: transparent;
            color: #555;
            border: 1px solid #222;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .pool-btn.active { border-color: #00ffcc; color: #00ffcc; background: rgba(0, 255, 204, 0.1); }

        /* --- 右側主區域：關鍵修正 --- */
        .main-content {
            flex: 1;
            height: 100vh;
            overflow-y: auto; /* 只有上下可以滾動 */
            overflow-x: hidden; /* 絕對禁止左右滾動 */
            padding: 20px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex;
            justify-content: center; /* 讓內容居中 */
        }

        .container {
            width: 100%;
            max-width: 1100px; /* 限制最大寬度，避免在大螢幕上太散 */
            background: rgba(10, 10, 10, 0.9);
            padding: 25px;
            border: 1px solid #333;
            animation: rgb-glow 10s linear infinite;
        }

        @keyframes rgb-glow { 0% { border-color: #ff0055; } 50% { border-color: #00ffcc; } 100% { border-color: #ff0055; } }

        h2 { border-bottom: 2px solid #222; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* --- 統計面板 --- */
        .stats-panel {
            display: flex;
            flex-wrap: wrap; /* 自動換行，防止撐破螢幕 */
            justify-content: space-around;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid #222;
        }
        .stat-item { text-align: center; min-width: 70px; padding: 5px; border-bottom: 1px solid #222; }
        .stat-label { color: #555; font-size: 10px; display: block; }
        .stat-val { font-size: 18px; font-weight: bold; color: #ff0055; }

        /* --- 卡片顯示區 --- */
        .display-area {
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-content: flex-start;
            flex-wrap: wrap; /* 關鍵：卡片滿了自動往下掉 */
            gap: 15px;
            background: #000;
            padding: 20px;
            border: 1px solid #111;
        }

        .card {
            width: 130px;
            height: 190px;
            background: #050505;
            border: 2px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: 0.2s;
        }
        .card img { width: 100%; height: 145px; object-fit: cover; }
        .card .card-rank { width: 100%; height: 45px; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; background: #0a0a0a; }

        /* 稀有度顏色 */
        .rank-f, .rank-e, .rank-d, .rank-c { border-color: #333; color: #666; }
        .rank-b, .rank-a { border-color: #aa00ff; color: #aa00ff; }
        .rank-s { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 10px rgba(255,0,85,0.3); }
        .rank-ss { border-color: #ffd700; color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .rank-sss { border-color: #fff; color: #fff; box-shadow: 0 0 25px #fff; }

        .btn { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; padding: 12px 25px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .btn:hover { background: #00ffcc; color: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-title">TERMINAL</div>
        <button class="pool-btn active" data-pool="frieren">葬送的芙莉蓮</button>
        <button class="pool-btn" data-pool="elite">實力至上教室</button>
        <button class="pool-btn" data-pool="jujutsu">咒術迴戰</button>
        <div style="margin-top: auto;">
            <button class="btn" id="btn-go-backpack" style="width: 100%; border-color: #aa00ff; color: #aa00ff;">查看背包 (INV)</button>
        </div>
    </div>

    <div class="main-content">
        <div class="container" id="main-container">
            <h2>
                <span id="system-title">>_ DUNGEON: FRIEREN</span>
                <span style="font-size: 12px; color: #ff0055;" id="player-id">ID: SYNCING...</span>
            </h2>
            <div id="sys-message">系統已就緒。</div>

            <div id="gacha-view">
                <div class="display-area" id="draw-area"></div>
                <div style="margin-top: 20px; display: flex; gap: 15px;">
                    <button class="btn" id="btn-draw-1">單次召喚</button>
                    <button class="btn" id="btn-draw-5">五連召喚</button>
                </div>
            </div>

            <div id="backpack-view" class="hidden">
                <div class="stats-panel" id="army-stats"></div>
                <div class="display-area" id="inventory-area"></div>
                <button class="btn" id="btn-go-gacha" style="margin-top: 20px;"><< 返回大廳</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo",
            authDomain: "my-gacha-game-f7663.firebaseapp.com",
            projectId: "my-gacha-game-f7663",
            storageBucket: "my-gacha-game-f7663.firebasestorage.app",
            messagingSenderId: "1035192644413",
            appId: "1:1035192644413:web:1ad5337b9760a154cf8b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserDocRef = null;
        let currentPoolId = 'frieren';

        // 設定每個等級的張數
        const poolSettings = {
            'frieren': { f:1, e:20, d:10, c:5, b:3, a:2, s:1, ss:1, sss:1 },
            'elite':   { f:1, e:10, d:5, c:5, b:3, a:2, s:1, ss:1, sss:1 },
            'jujutsu': { f:1, e:15, d:8, c:5, b:4, a:3, s:1, ss:1, sss:1 }
        };

        const chances = [
            { r: 'f', p: 0.20 }, { r: 'e', p: 0.25 }, { r: 'd', p: 0.205 },
            { r: 'c', p: 0.17 }, { r: 'b', p: 0.13 }, { r: 'a', p: 0.025 },
            { r: 's', p: 0.015 }, { r: 'ss', p: 0.005 }, { r: 'sss', p: 0 }
        ];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const id = user.email.split('@')[0];
                currentUserDocRef = doc(db, "users", id);
                document.getElementById('player-id').innerText = `USER: ${id}`;
            } else { window.location.href = "index.html"; }
        });

        function generateCard(pId) {
            let rand = Math.random(), cum = 0, rank = 'f';
            for (let c of chances) { cum += c.p; if (rand <= cum) { rank = c.r; break; } }
            const num = Math.floor(Math.random() * poolSettings[pId][rank]) + 1;
            return `${pId}_${rank}_${num}`;
        }

        function getCardHTML(fullId) {
            const [p, r, n] = fullId.split('_');
            const imgPath = `images/${p}/${r}${n}.png`;
            return `<div class="card rank-${r}">
                <img src="${imgPath}" onerror="this.src='https://via.placeholder.com/130x145/000/00ffcc?text=DATA_LOCKED'">
                <div class="card-rank">${r.toUpperCase()}級</div>
            </div>`;
        }

        async function performGacha(times) {
            const area = document.getElementById('draw-area');
            area.innerHTML = '';
            let newCards = [];
            for(let i=0; i<times; i++) {
                const id = generateCard(currentPoolId);
                newCards.push(id);
                area.innerHTML += getCardHTML(id);
            }
            await updateDoc(currentUserDocRef, { inventory: arrayUnion(...newCards) });
            document.getElementById('sys-message').innerText = `召喚完成，共 ${times} 個單元。`;
        }

        async function loadBackpack() {
            const invArea = document.getElementById('inventory-area');
            const statArea = document.getElementById('army-stats');
            invArea.innerHTML = '';
            const docSnap = await getDoc(currentUserDocRef);
            if (docSnap.exists()) {
                const inv = docSnap.data().inventory || [];
                const counts = { f:0, e:0, d:0, c:0, b:0, a:0, s:0, ss:0, sss:0 };
                inv.forEach(id => {
                    invArea.innerHTML += getCardHTML(id);
                    const r = id.split('_')[1];
                    if (counts.hasOwnProperty(r)) counts[r]++;
                });
                // 渲染統計文字：F級: 數量
                statArea.innerHTML = Object.keys(counts).map(k => {
                    return `<div class="stat-item"><span class="stat-label">${k.toUpperCase()}級</span><span class="stat-val">${counts[k]}</span></div>`;
                }).join('');
            }
        }

        document.querySelectorAll('.pool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPoolId = btn.dataset.pool;
                document.getElementById('system-title').innerText = `>_ DUNGEON: ${currentPoolId.toUpperCase()}`;
                document.getElementById('backpack-view').classList.add('hidden');
                document.getElementById('gacha-view').classList.remove('hidden');
            });
        });

        document.getElementById('btn-draw-1').addEventListener('click', () => performGacha(1));
        document.getElementById('btn-draw-5').addEventListener('click', () => performGacha(5));
        document.getElementById('btn-go-backpack').addEventListener('click', () => {
            document.getElementById('gacha-view').classList.add('hidden');
            document.getElementById('backpack-view').classList.remove('hidden');
            loadBackpack();
        });
        document.getElementById('btn-go-gacha').addEventListener('click', () => {
            document.getElementById('backpack-view').classList.add('hidden');
            document.getElementById('gacha-view').classList.remove('hidden');
        });
    </script>
</body>
</html>
