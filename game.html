<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Solo_Leveling_System_PRO_MAX</title>
    <style>
        /* --- 基礎特效保留與進化 --- */
        body {
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: row;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* --- 左側導覽列 (Pro 版質感) --- */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: linear-gradient(180deg, #111 0%, #000 100%);
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            padding: 25px 15px;
            gap: 12px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar-title {
            font-size: 14px;
            color: #00ffcc;
            margin-bottom: 20px;
            padding-left: 10px;
            letter-spacing: 3px;
            border-left: 3px solid #ff0055;
        }
        .pool-btn {
            background: rgba(255, 255, 255, 0.03);
            color: #666;
            border: 1px solid #222;
            padding: 18px 15px;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
        }
        .pool-btn:hover { border-color: #00ffcc; color: #fff; background: rgba(0, 255, 204, 0.05); }
        .pool-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        /* --- 右側主區域 --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            overflow-y: auto;
            max-width: calc(100vw - 250px);
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }

        .container {
            width: 100%;
            background: rgba(5, 5, 5, 0.8);
            padding: 30px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1);
            position: relative;
            animation: rgb-glow 10s linear infinite;
        }

        @keyframes rgb-glow {
            0% { border-color: #ff0055; }
            50% { border-color: #00ffcc; }
            100% { border-color: #ff0055; }
        }

        /* --- 震撼特效 (Screen Shake) --- */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(3px, 2px) rotate(0deg); }
            60% { transform: translate(-3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, 2px) rotate(0deg); }
        }
        .shake-effect { animation: shake 0.5s; }

        h2 {
            border-bottom: 2px solid #222;
            padding-bottom: 20px;
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-right { display: flex; align-items: center; gap: 20px; }
        .user-info { color: #ff0055; font-size: 13px; font-weight: bold; }
        .logout-link { color: #444; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .logout-link:hover { color: #ff0055; }

        #sys-message {
            color: #00ffcc;
            margin: 20px 0;
            font-size: 14px;
            font-weight: bold;
        }

        .display-area {
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 35px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #111;
            padding: 25px;
            gap: 20px;
        }

        /* --- 卡片設計 --- */
        .card {
            width: 150px; height: 220px; background: #000; border: 2px solid #333;
            display: flex; flex-direction: column; align-items: center; transition: 0.4s;
            position: relative;
        }
        .card:hover { transform: scale(1.1) rotate(2deg); z-index: 100; border-color: #fff; }
        .card img { width: 100%; height: 170px; object-fit: cover; filter: grayscale(30%); transition: 0.3s; }
        .card:hover img { filter: grayscale(0%); }
        .card .card-rank { 
            width: 100%; height: 50px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 14px; background: #111; font-weight: bold;
        }

        /* 稀有度顏色 (已去獵人化) */
        .rank-f, .rank-e, .rank-d, .rank-c { border-color: #333; color: #666; }
        .rank-b, .rank-a { border-color: #aa00ff; color: #aa00ff; box-shadow: 0 0 15px rgba(170, 0, 255, 0.4); }
        .rank-s { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 25px rgba(255, 0, 85, 0.6); }
        .rank-ss { border-color: #ffd700; color: #ffd700; box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
        .rank-sss { border-color: #fff; color: #fff; box-shadow: 0 0 40px #fff; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* --- 背包統計 (Pro 佈局) --- */
        .stats-panel { 
            display: flex;
            justify-content: center;
            gap: 15px; margin-bottom: 25px; padding: 20px; 
            background: #0a0a0a; border: 1px solid #222; flex-wrap: wrap;
        }
        .stat-item { text-align: center; min-width: 70px; border-bottom: 2px solid #222; padding-bottom: 5px; }
        .stat-label { color: #444; font-size: 10px; display: block; }
        .stat-val { font-size: 22px; font-weight: bold; color: #00ffcc; }

        .button-group { display: flex; gap: 20px; }
        .btn { 
            background: transparent; color: #00ffcc; border: 1px solid #00ffcc; 
            padding: 15px 35px; cursor: pointer; font-size: 15px; font-weight: bold; 
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; }
        .btn-purple { border-color: #aa00ff; color: #aa00ff; }
        .btn-purple:hover { background: #aa00ff; color: #fff; box-shadow: 0 0 20px #aa00ff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-title">SYSTEM_TERMINAL</div>
        <button class="pool-btn active" data-pool="frieren">葬送的芙莉蓮</button>
        <button class="pool-btn" data-pool="elite">實力至上教室</button>
        <button class="pool-btn" data-pool="jujutsu">咒術迴戰</button>
        
        <div style="margin-top: auto;">
            <button class="btn btn-purple" id="btn-go-backpack" style="width: 100%;">查看背包 (INV)</button>
        </div>
    </div>

    <div class="main-content" id="main-view">
        <div class="container">
            <h2>
                <span id="system-title">>_ DUNGEON: FRIEREN</span>
                <div class="header-right">
                    <span class="user-info" id="player-name">USER: CONNECTING...</span>
                    <span class="logout-link" id="btn-logout">[SHUTDOWN]</span>
                </div>
            </h2>
            
            <div id="sys-message">待機中...</div>
            
            <div id="gacha-view">
                <div class="display-area" id="draw-area">
                    <p style="color: #222;">[等待輸入召喚序列]</p>
                </div>
                <div class="button-group">
                    <button class="btn" id="btn-draw-1">單抽召喚 (1x)</button>
                    <button class="btn" id="btn-draw-5">五連召喚 (5x)</button>
                </div>
            </div>

            <div id="backpack-view" class="hidden">
                <div class="stats-panel" id="army-stats"></div>
                <div class="display-area" id="inventory-area"></div>
                <button class="btn" id="btn-go-gacha"><< 返回終端</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo",
            authDomain: "my-gacha-game-f7663.firebaseapp.com",
            projectId: "my-gacha-game-f7663",
            storageBucket: "my-gacha-game-f7663.firebasestorage.app",
            messagingSenderId: "1035192644413",
            appId: "1:1035192644413:web:1ad5337b9760a154cf8b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserDocRef = null;
        let currentPoolId = 'frieren';

        const pools = {
            'frieren': {
                title: ">_ DUNGEON: FRIEREN",
                cards: [
                    { id: "f_f", name: "F級 芙莉蓮", img: "images/f_f.png", class: "rank-f", chance: 0.20 },
                    { id: "f_e", name: "E級 費倫", img: "images/f_e.png", class: "rank-e", chance: 0.25 },
                    { id: "f_d", name: "D級 修塔爾克", img: "images/f_d.png", class: "rank-d", chance: 0.205 },
                    { id: "f_c", name: "C級 海塔", img: "images/f_c.png", class: "rank-c", chance: 0.17 },
                    { id: "f_b", name: "B級 艾冉", img: "images/f_b.png", class: "rank-b", chance: 0.13 },
                    { id: "f_a", name: "A級 贊恩", img: "images/f_a.png", class: "rank-a", chance: 0.025 },
                    { id: "f_s", name: "S級 辛美爾", img: "images/f_s.png", class: "rank-s", chance: 0.015 },
                    { id: "f_ss", name: "SS級 大魔法師", img: "images/f_ss.png", class: "rank-ss", chance: 0.005 },
                    { id: "f_sss", name: "SSS級 暗影芙莉蓮", img: "images/f_sss.png", class: "rank-sss", chance: 0 }
                ]
            },
            'elite': {
                title: ">_ ACADEMY: ELITE",
                cards: [
                    { id: "e_f", name: "F級 堀北學", img: "images/e_f.png", class: "rank-f", chance: 0.20 },
                    { id: "e_e", name: "E級 櫛田", img: "images/e_e.png", class: "rank-e", chance: 0.25 },
                    { id: "e_d", name: "D級 須藤", img: "images/e_d.png", class: "rank-d", chance: 0.205 },
                    { id: "e_c", name: "C級 佐倉", img: "images/e_c.png", class: "rank-c", chance: 0.17 },
                    { id: "e_b", name: "B級 一之瀨", img: "images/e_b.png", class: "rank-b", chance: 0.13 },
                    { id: "e_a", name: "A級 坂柳", img: "images/e_a.png", class: "rank-a", chance: 0.025 },
                    { id: "e_s", name: "S級 綾小路", img: "images/e_s.png", class: "rank-s", chance: 0.015 },
                    { id: "e_ss", name: "SS級 白屋王者", img: "images/e_ss.png", class: "rank-ss", chance: 0.005 },
                    { id: "e_sss", name: "SSS級 幕後君王", img: "images/e_sss.png", class: "rank-sss", chance: 0 }
                ]
            },
            'jujutsu': {
                title: ">_ CURSE: JUJUTSU",
                cards: [
                    { id: "j_f", name: "F級 熊貓", img: "images/j_f.png", class: "rank-f", chance: 0.20 },
                    { id: "j_e", name: "E級 真希", img: "images/j_e.png", class: "rank-e", chance: 0.25 },
                    { id: "j_d", name: "D級 棘", img: "images/j_d.png", class: "rank-d", chance: 0.205 },
                    { id: "j_c", name: "C級 釘崎", img: "images/j_c.png", class: "rank-c", chance: 0.17 },
                    { id: "j_b", name: "B級 伏黑", img: "images/j_b.png", class: "rank-b", chance: 0.13 },
                    { id: "j_a", name: "A級 七海", img: "images/j_a.png", class: "rank-a", chance: 0.025 },
                    { id: "j_s", name: "S級 五條悟", img: "images/j_s.png", class: "rank-s", chance: 0.015 },
                    { id: "j_ss", name: "SS級 宿儺", img: "images/j_ss.png", class: "rank-ss", chance: 0.005 },
                    { id: "j_sss", name: "SSS級 詛咒之王", img: "images/j_sss.png", class: "rank-sss", chance: 0 }
                ]
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const realId = user.email.split('@')[0];
                currentUserDocRef = doc(db, "users", realId);
                const docSnap = await getDoc(currentUserDocRef);
                if (docSnap.exists()) {
                    document.getElementById('player-name').innerText = `USER: ${realId} | ${docSnap.data().name}`;
                }
            } else { window.location.href = "index.html"; }
        });

        function createCardHTML(card) {
            return `<div class="card ${card.class}"><img src="${card.img}" onerror="this.src='https://via.placeholder.com/130x145/111/00ffcc?text=No_Image'"><div class="card-rank">${card.name}</div></div>`;
        }

        async function performGacha(times) {
            const pool = pools[currentPoolId].cards;
            const drawArea = document.getElementById('draw-area');
            const sysMessage = document.getElementById('sys-message');
            const container = document.querySelector('.container');
            
            drawArea.innerHTML = '';
            sysMessage.innerText = "警告：正在干涉因果律...";
            
            let resultsIds = [];
            let hasRare = false;

            for(let i=0; i<times; i++) {
                let rand = Math.random(), cumulative = 0, picked = pool[0];
                for (let card of pool) {
                    cumulative += card.chance;
                    if (rand <= cumulative) { picked = card; break; }
                }
                if (picked.class.includes('rank-s')) hasRare = true;
                resultsIds.push(picked.id);
                drawArea.innerHTML += createCardHTML(picked);
            }

            // --- 觸發震動特效 ---
            if (hasRare) {
                container.classList.add('shake-effect');
                setTimeout(() => container.classList.remove('shake-effect'), 500);
            }

            try {
                await updateDoc(currentUserDocRef, { inventory: arrayUnion(...resultsIds) });
                sysMessage.innerText = `召喚完成。共 ${times} 名戰力編入。`;
            } catch (e) { sysMessage.innerText = "連線超時：召喚中斷。"; }
        }

        async function loadBackpack() {
            const inventoryArea = document.getElementById('inventory-area');
            const statsPanel = document.getElementById('army-stats');
            const sysMessage = document.getElementById('sys-message');
            inventoryArea.innerHTML = '';
            sysMessage.innerText = "資料同步中...";

            try {
                const docSnap = await getDoc(currentUserDocRef);
                if (docSnap.exists()) {
                    const inv = docSnap.data().inventory || [];
                    const allPoolCards = Object.values(pools).flatMap(p => p.cards);
                    const countMap = { "f":0, "e":0, "d":0, "c":0, "b":0, "a":0, "s":0, "ss":0, "sss":0 };
                    
                    inv.forEach(id => {
                        const cardData = allPoolCards.find(c => c.id === id);
                        if (cardData) {
                            inventoryArea.innerHTML += createCardHTML(cardData);
                            // 修正後的統計邏輯：根據 ID 最後一個字母判斷等級
                            const rankKey = id.split('_').pop();
                            if (countMap.hasOwnProperty(rankKey)) {
                                countMap[rankKey] += 1;
                            }
                        }
                    });

                    statsPanel.innerHTML = Object.keys(countMap).map(key => {
                        if (key === 'sss' && countMap[key] === 0) return '';
                        return `<div class="stat-item"><span class="stat-label">${key.toUpperCase()}級</span><span class="stat-val">${countMap[key]}</span></div>`;
                    }).join('');
                    sysMessage.innerText = `軍團總規模：${inv.length} 人。`;
                }
            } catch (e) { console.error(e); }
        }

        document.querySelectorAll('.pool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPoolId = btn.dataset.pool;
                document.getElementById('system-title').innerText = pools[currentPoolId].title;
                document.getElementById('draw-area').innerHTML = `<p style="color: #222;">[卡池切換至 ${btn.innerText}]</p>`;
                document.getElementById('backpack-view').classList.add('hidden');
                document.getElementById('gacha-view').classList.remove('hidden');
            });
        });

        document.getElementById('btn-draw-1').addEventListener('click', () => performGacha(1));
        document.getElementById('btn-draw-5').addEventListener('click', () => performGacha(5));
        document.getElementById('btn-go-backpack').addEventListener('click', () => {
            document.getElementById('gacha-view').classList.add('hidden');
            document.getElementById('backpack-view').classList.remove('hidden');
            document.getElementById('system-title').innerText = ">_ GLOBAL_INVENTORY";
            loadBackpack();
        });
        document.getElementById('btn-go-gacha').addEventListener('click', () => {
            document.getElementById('backpack-view').classList.add('hidden');
            document.getElementById('gacha-view').classList.remove('hidden');
            document.getElementById('system-title').innerText = pools[currentPoolId].title;
        });
        document.getElementById('btn-logout').addEventListener('click', () => { if(confirm("中斷連線並關閉終端？")) signOut(auth).then(() => window.location.href = "index.html"); });
    </script>
</body>
</html>
