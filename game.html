<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: TCG V32 - 終極原點吸收版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #020617; display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; color: #e2e8f0; }
        #app { width: 100%; max-width: 400px; height: 100%; background: radial-gradient(circle at top, #1e293b 0%, #020617 100%); position: relative; display: flex; flex-direction: column; border: 1px solid #334155; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        
        #login-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        .sys-title { color: #38bdf8; font-size: 26px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 15px rgba(56,189,248,0.5); letter-spacing: 3px; }
        .sys-sub { color: #94a3b8; font-size: 11px; margin-bottom: 40px; letter-spacing: 4px; }
        .log-input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(30, 41, 59, 0.6); border: 1px solid #475569; color: #fff; border-radius: 8px; outline: none; font-size: 14px; transition: 0.3s; }
        .log-input:focus { border-color: #38bdf8; box-shadow: inset 0 0 10px rgba(56,189,248,0.2); background: rgba(30, 41, 59, 0.9); }
        .log-btn { width: 100%; padding: 15px; background: rgba(56,189,248,0.15); color: #38bdf8; border: 1px solid #38bdf8; font-weight: bold; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 10px; transition: 0.2s; letter-spacing: 2px; }
        .log-btn:active { background: #38bdf8; color: #020617; }

        .top-bar { height: 60px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); z-index: 10; }
        .p-info { display: flex; flex-direction: column; }
        .logout-btn { color: #f43f5e; font-size: 10px; background: rgba(244, 63, 94, 0.1); border: 1px solid #f43f5e; border-radius: 4px; padding: 3px 8px; margin-top: 4px; cursor: pointer; width: fit-content; transition: 0.2s;}
        .logout-btn:hover { background: #f43f5e; color: #fff; }
        .gold-ui { background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.4); padding: 5px 12px; border-radius: 6px; color: #facc15; font-weight: bold; font-size: 13px; box-shadow: 0 0 10px rgba(250,204,21,0.1); }
        
        .main-view { flex: 1; overflow-y: auto; padding: 15px; position: relative; }
        .pool-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: rgba(30, 41, 59, 0.5); color: #94a3b8; border: 1px solid #334155; padding: 10px; text-align: center; font-weight: bold; border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(4px); }
        .tab-btn.active { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border-color: rgba(56, 189, 248, 0.5); box-shadow: 0 0 10px rgba(56,189,248,0.1); }
        .banner { width: 100%; height: 180px; border-radius: 8px; margin-bottom: 20px; position: relative; overflow: hidden; border: 1px solid #475569; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        
        .gacha-btns { display: flex; gap: 10px; }
        .g-btn { flex: 1; padding: 15px; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56,189,248,0.4); color: #38bdf8; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; backdrop-filter: blur(4px); }
        .g-btn span { display: block; font-size: 10px; opacity: 0.6; margin-top: 4px; }
        .g-btn:active { transform: scale(0.97); background: rgba(56,189,248,0.2); }
        
        .m-card { background: rgba(30, 41, 59, 0.6); border: 1px solid #334155; border-left: 3px solid #38bdf8; padding: 15px; margin-bottom: 12px; border-radius: 6px; backdrop-filter: blur(4px); }
        .m-btn { width: 100%; margin-top: 10px; padding: 10px; background: rgba(56,189,248,0.15); color: #38bdf8; border: 1px solid rgba(56,189,248,0.4); font-weight: bold; border-radius: 4px; cursor: pointer; }
        .m-btn:disabled { background: rgba(15, 23, 42, 0.5); color: #475569; border-color: #334155; cursor: not-allowed; }

        /* ========================================= */
        /* 🛡️ V32 特效層：拔除所有位移動畫，死守原地 */
        /* ========================================= */
        #overlay { 
            position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100dvh; 
            background: rgba(2,6,23,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            z-index: 10000; display: none; 
        }
        .stack-wrap {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 220px; height: 320px;
            perspective: 1200px;
        }
        .stack { position: relative; width: 100%; height: 100%; }

        #hint { 
            position: absolute; bottom: 15%; left: 50%; 
            transform: translateX(-50%); 
            color: #94a3b8; font-size: 13px; letter-spacing: 2px; 
            background: rgba(15,23,42,0.85); padding: 10px 25px; 
            border-radius: 20px; border: 1px solid #334155; 
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            white-space: nowrap;
        }
        
        .card-w { position: absolute; top:0; left:0; width:100%; height:100%; transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; }
        .card-i { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-i.flipped { transform: rotateY(180deg) scale(1.08); }
        
        .face { position: absolute; width:100%; height:100%; backface-visibility: hidden; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .back { background: linear-gradient(135deg, #1e293b 0%, #020617 100%); display: flex; justify-content: center; align-items: center; border: 1px solid rgba(56,189,248,0.3); box-shadow: inset 0 0 30px rgba(0,0,0,0.8); position: relative;}
        .back::after { content: 'SL'; color: rgba(255, 255, 255, 0.05); font-size: 50px; font-weight: 900; letter-spacing: 8px; }
        
        .front { transform: rotateY(180deg); background: #0f172a; display: flex; flex-direction: column; }
        .front img { width: 100%; height: 100%; object-fit: cover; object-position: center top; position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.9; }
        .r-banner { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; z-index: 2; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 15px; letter-spacing: 3px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; }
        
        /* 🚨 V32 殺手鐧：徹底拔除 translateY，只保留 scale(0) 原地縮小，絕對不可能往下掉！ */
        @keyframes fly { 
            0% { opacity: 1; transform: rotateY(180deg) scale(1.08); filter: blur(0px); } 
            40% { opacity: 1; transform: rotateY(180deg) scale(1.15); filter: blur(2px); box-shadow: 0 0 50px #38bdf8; } /* 微微放大發光 */
            100% { opacity: 0; transform: rotateY(180deg) scale(0); filter: blur(10px); } /* 縮小到 0 消失 */
        }
        .dismissed { animation: fly 0.6s forwards; pointer-events: none; }
        
        .hidden { display: none !important; }
        .nav { height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .nav-i { color: #64748b; font-size: 11px; text-align: center; cursor: pointer; transition: 0.2s; letter-spacing: 1px; font-weight: bold;}
        .nav-i.active { color: #38bdf8; text-shadow: 0 0 10px rgba(56,189,248,0.4); }

        #sign-toast { position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(30,41,59,0.9); backdrop-filter: blur(8px); border: 1px solid rgba(250,204,21,0.4); border-radius: 6px; padding: 12px 20px; color: #facc15; font-size: 13px; z-index: 200; text-align: center; opacity: 0; pointer-events: none; transition: 0.5s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        #sign-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #pity-bar-wrap { margin-top: 14px; }
        #pity-bar-wrap label { font-size: 10px; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 6px; letter-spacing: 1px;}
        #pity-bar-track { width: 100%; height: 6px; background: #0f172a; overflow: hidden; border-radius: 3px; border: 1px solid #334155;}
        #pity-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #a855f7); transition: width 0.5s ease; box-shadow: 0 0 10px rgba(168,85,247,0.5);}

        #bag-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-top: 5px; }
        .bag-card { position: relative; border-radius: 6px; overflow: hidden; border: 1px solid #334155; background: rgba(15, 23, 42, 0.7); aspect-ratio: 2/3; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .bag-card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center top; transition: 0.3s; z-index: 1;}
        .bag-card .rarity-label { position: absolute; bottom: 0; left: 0; right: 0; height: 22px; line-height: 22px; text-align: center; font-size: 10px; font-weight: bold; background: rgba(15,23,42,0.9); letter-spacing: 1px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2;}
        .bag-card .count-badge { position: absolute; top: 4px; right: 4px; background: rgba(15,23,42,0.9); border: 1px solid rgba(250,204,21,0.5); color: #facc15; font-size: 9px; border-radius: 4px; padding: 2px 5px; z-index: 3;}
        
        .bag-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .bag-header h2 { color: #38bdf8; font-size: 14px; letter-spacing: 1px;}
        .bag-header span { font-size: 11px; color: #94a3b8; }

        .bag-card.locked { border-color: #1e293b !important; box-shadow: none !important; background: rgba(2,6,23,0.5); }
        .bag-card.locked img { filter: brightness(0.1) grayscale(100%); opacity: 0.3; }
        .bag-card.locked .rarity-label { color: #475569 !important; background: transparent; border-top-color: transparent;}

        @keyframes breathSSS { 0% { box-shadow: inset 0 0 10px rgba(225,29,72,0.2); } 50% { box-shadow: inset 0 0 25px rgba(225,29,72,0.5); } 100% { box-shadow: inset 0 0 10px rgba(225,29,72,0.2); } }
        .rarity-SSS { border-color: rgba(225,29,72,0.6) !important; animation: breathSSS 3s infinite ease-in-out; }
        .rarity-SSS .r-banner { color: #fb7185; text-shadow: 0 0 8px rgba(251,113,133,0.5); border-top-color: rgba(225,29,72,0.4); }
        .rarity-SSS .rarity-label { color: #fb7185; }
        
        .rarity-SS { border-color: rgba(249,115,22,0.4) !important; box-shadow: inset 0 0 15px rgba(249,115,22,0.15); }
        .rarity-SS .r-banner, .rarity-SS .rarity-label { color: #fdba74; }
        
        .rarity-S { border-color: rgba(168,85,247,0.4) !important; box-shadow: inset 0 0 15px rgba(168,85,247,0.15); }
        .rarity-S .r-banner, .rarity-S .rarity-label { color: #d8b4fe; }
        
        .rarity-A { border-color: rgba(234,179,8,0.3) !important; } .rarity-A .r-banner, .rarity-A .rarity-label { color: #fde047; }
        .rarity-B { border-color: rgba(6,182,212,0.3) !important; } .rarity-B .r-banner, .rarity-B .rarity-label { color: #67e8f9; }
        .rarity-C { border-color: rgba(148,163,184,0.3) !important; } .rarity-C .r-banner, .rarity-C .rarity-label { color: #cbd5e1; }
        .rarity-D { border-color: rgba(51,65,85,0.5) !important; filter: grayscale(30%);} .rarity-D .r-banner, .rarity-D .rarity-label { color: #94a3b8; }
        
        .card-guaranteed .back { border-color: rgba(234,179,8,0.5) !important; box-shadow: inset 0 0 25px rgba(234,179,8,0.2); }
    </style>
</head>
<body>
    <div id="app">
        <div id="login-view">
            <div class="sys-title">SYS_LOGIN</div>
            <div class="sys-sub">HUNTER ASSOCIATION</div>
            <input type="email" id="log-email" class="log-input" placeholder="User Email">
            <input type="password" id="log-pw" class="log-input" placeholder="Password">
            <button class="log-btn" onclick="executeLogin()">ACCESS</button>
            <p id="log-err" style="color:#f43f5e; font-size:12px; margin-top:15px; display:none; letter-spacing:1px;">ACCESS DENIED</p>
        </div>

        <div class="top-bar">
            <div class="p-info">
                <h1 id="p-id" style="color:#38bdf8; font-size:12px; letter-spacing:1px;">ID: ...</h1>
                <button class="logout-btn" onclick="executeLogout()">LOGOUT</button>
            </div>
            <div class="gold-ui">G: <span id="p-gold">0</span></div>
        </div>

        <div id="sign-toast">
            系統配給已發放<div style="font-size:11px;color:#38bdf8;margin-top:4px;">+50 G</div>
        </div>

        <div id="overlay">
            <div class="stack-wrap">
                <div class="stack" id="stack"></div>
            </div>
            <div id="hint">[ 點擊進行數據回收 ]</div>
        </div>

        <div class="main-view">
            <div id="page-gacha">
                <div class="pool-tabs">
                    <div class="tab-btn active" onclick="switchPool('freren', this)">芙莉蓮</div>
                    <div class="tab-btn" onclick="switchPool('elite', this)">實力至上</div>
                </div>
                <div class="banner">
                    <img id="b-img" src="images/freren/banner.jpg" onerror="this.src='https://via.placeholder.com/400x180/111/444'">
                    <div style="position:absolute; bottom:10px; left:10px; color:#f8fafc; font-size: 13px; font-weight:bold; letter-spacing:1px; text-shadow: 0 2px 5px #000;" id="b-txt">> ARCHIVE: Frieren</div>
                </div>
                <div class="gacha-btns">
                    <button class="g-btn" onclick="draw(1, 70)">單次解析<span>70 G</span></button>
                    <button class="g-btn" style="border-color:rgba(168,85,247,0.4); color:#d8b4fe;" onclick="draw(5, 300)">五連解析<span>300 G</span></button>
                </div>
                <div id="pity-bar-wrap">
                    <label><span>🛡 S級以上保底演算</span><span id="pity-text">0 / 50</span></label>
                    <div id="pity-bar-track"><div id="pity-bar-fill" style="width:0%"></div></div>
                </div>
            </div>

            <div id="page-mission" class="hidden"><div id="m-list"></div></div>
            <div id="page-bag" class="hidden">
                <div class="bag-header"><h2>🎒 ARCHIVE</h2><span id="bag-count">0 / 0</span></div>
                <div id="bag-list"></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-i active" onclick="tab('page-gacha', this)">召喚</div>
            <div class="nav-i" onclick="tab('page-mission', this)">任務</div>
            <div class="nav-i" onclick="tab('page-bag', this)">圖鑑</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const config = { apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo", authDomain: "my-gacha-game-f7663.firebaseapp.com", projectId: "my-gacha-game-f7663", storageBucket: "my-gacha-game-f7663.firebasestorage.app", messagingSenderId: "1035192644413", appId: "1:1035192644413:web:1ad5337b9760a154cf8b54" };
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userRef = null;
        let uData = { gold: 0, inventory: [], pending: [], pity_count: 0 };
        let currentPool = 'freren';

        // 🚨 V32 寫死實力至上陣容，如果還是出不來，100%是GitHub檔案大小寫或資料夾名稱有錯！
        const pools = {
            'freren': { 
                sss: ['sss1.jpg'], ss: ['ss1.jpg'], s: ['s1.jpg', 's2.jpg', 's3.webp', 's4.jpg', 's5.jpg'], 
                a: ['a1.jpg', 'a2.jpg', 'a3.jpg', 'a5.jpg', 'a6.jpg'], b: ['b1.jpg', 'b2.jpg', 'b3.jpg', 'b4.jpg', 'b5.jpg', 'b6.jpg', 'b7.jpg', 'b8.jpg', 'b9.jpg'], 
                c: ['c1.jpg', 'c2.jpg', 'c3.jpg', 'c4.jpg', 'c5.jpg', 'c6.jpg', 'c7.jpg', 'c8.jpg', 'c9.jpg', 'c10.jpg'], d: ['d1.jpg', 'd2.jpg', 'd3.jpg', 'd4.jpg', 'd5.jpg', 'd6.jpg', 'd7.jpg', 'd8.jpg'] 
            },
            'elite': { 
                sss: ['sss1.jpg', 'sss2.jpg', 'sss3.jpg'], 
                ss: ['ss1.jpg'], 
                s: ['s1.jpg', 's2.jpg', 's3.jpg', 's4.jpg'], 
                a: ['a1.jpg', 'a2.jpg', 'a3.jpg', 'a4.jpg', 'a5.jpg', 'a6.jpg'], 
                b: ['b1.jpg', 'b2.jpg', 'b3.jpg', 'b4.jpg', 'b5.jpg', 'b6.jpg'], 
                c: ['c2.jpg', 'c3.jpg', 'c4.jpg', 'c5.jpg', 'c6.jpg'], 
                d: ['d1.jpg'] 
            }
        };
        const rates = [ {r:'d', p:0.4}, {r:'c', p:0.3}, {r:'b', p:0.18}, {r:'a', p:0.08}, {r:'s', p:0.03}, {r:'ss', p:0.008}, {r:'sss', p:0.002} ];

        window.executeLogin = () => {
            const email = document.getElementById('log-email').value;
            const pw = document.getElementById('log-pw').value;
            document.getElementById('log-err').style.display = 'none';
            signInWithEmailAndPassword(auth, email, pw).catch(err => {
                document.getElementById('log-err').style.display = 'block';
            });
        };

        window.executeLogout = () => { if(confirm('確定要登出連線嗎？')) signOut(auth); };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                document.getElementById('login-view').style.display = 'none';
                const id = u.email.split('@')[0];
                document.getElementById('p-id').innerText = `ID: ${id}`;
                userRef = doc(db, "users", id);

                const snap = await getDoc(userRef);
                if (!snap.exists()) await setDoc(userRef, { gold: 500, inventory: [], pending: [], pity_count: 0 });

                onSnapshot(userRef, (s) => {
                    if (s.exists()) {
                        uData = s.data();
                        uData.pity_count = uData.pity_count || 0;
                        uData.inventory = (uData.inventory || []).filter(item => item && typeof item === 'object' && item.id);
                        document.getElementById('p-gold').innerText = Number(uData.gold) || 0; 
                        updatePityBar(uData.pity_count);
                        renderBag();
                    }
                });
                syncMissions();
            } else {
                document.getElementById('login-view').style.display = 'flex';
                document.getElementById('log-pw').value = ''; 
            }
        });

        function updatePityBar(count) {
            const pity = Math.min(count, 50);
            document.getElementById('pity-text').innerText = `${pity} / 50`;
            document.getElementById('pity-bar-fill').style.width = `${(pity / 50) * 100}%`;
        }

        function syncMissions() {
            onSnapshot(doc(db, "config", "game_data"), (s) => {
                const list = document.getElementById('m-list');
                list.innerHTML = '<h2 style="color:#38bdf8;margin-bottom:15px; font-size:14px; letter-spacing:1px;">當前委託任務</h2>';
                const missions = s.exists() ? (s.data().missions || []) : [];
                if (missions.length === 0) return list.innerHTML += '<div style="color:#64748b; font-size:11px;">無待處理的委託紀錄。</div>';
                missions.forEach(m => {
                    const isP = uData.pending?.includes(m.id);
                    list.innerHTML += `<div class="m-card"><b style="color:#e2e8f0;">${m.title}</b><span style="float:right;color:#facc15">+${m.reward} G</span><p style="font-size:11px;color:#94a3b8;margin-top:6px;">${m.desc}</p><button class="m-btn" onclick="rep('${m.id}')" ${isP ? 'disabled style="background:rgba(15,23,42,0.5);cursor:not-allowed"' : ''}>${isP ? '審核中...' : '回報完成'}</button></div>`;
                });
            });
        }

        window.rep = async (id) => {
            await updateDoc(userRef, { pending: arrayUnion(id) });
            await setDoc(doc(db, "config", "game_data"), { reports: arrayUnion({ uid: auth.currentUser.email.split('@')[0], mid: id }) }, { merge: true });
            alert("資料已上傳至協會，請等待審核。");
        };

        window.draw = async (n, cost) => {
            const currentGold = Number(uData.gold) || 0;
            if (currentGold < cost) return alert("系統配給不足！請完成委託任務。");
            
            let pityCount = uData.pity_count || 0;
            let results = [];
            let newPityCount = pityCount;

            for (let i = 0; i < n; i++) {
                let rank = 'd';
                let isGuaranteed = false;
                if (newPityCount >= 49) { rank = 's'; isGuaranteed = true; newPityCount = 0; } 
                else {
                    let rand = Math.random(), cum = 0;
                    for (let c of rates) { cum += c.p; if (rand <= cum) { rank = c.r; break; } }
                    if (['s', 'ss', 'sss'].includes(rank)) newPityCount = 0; else newPityCount++;
                }
                const files = pools[currentPool][rank];
                const file = files.length > 0 ? files[Math.floor(Math.random() * files.length)] : 'default.jpg';
                results.push({ rank, file, isGuaranteed, id: `${currentPool}_${rank}_${file}` });
            }

            const invMap = {};
            (uData.inventory || []).forEach(c => { invMap[c.id] = { ...c }; });
            results.forEach(card => {
                if (invMap[card.id]) { invMap[card.id].count = (invMap[card.id].count || 1) + 1; } 
                else { invMap[card.id] = { id: card.id, pool: currentPool, rarity: card.rank, img: `images/${currentPool}/${card.file}`, count: 1 }; }
            });

            await updateDoc(userRef, { gold: currentGold - cost, pity_count: newPityCount, inventory: Object.values(invMap) });
            startGacha(results);
        };

        function startGacha(cards) {
            const overlay = document.getElementById('overlay');
            const stack = document.getElementById('stack');
            overlay.style.display = 'block'; 
            document.getElementById('hint').innerText = '[ 點擊進行數據回收 ]'; 
            stack.innerHTML = '';
            let active = 0, rev = false;

            cards.reverse().forEach((card, i) => {
                const w = document.createElement('div');
                w.className = 'card-w' + (card.isGuaranteed ? ' card-guaranteed' : '');
                w.style.zIndex = cards.length - i;
                w.style.transform = `translate(${i * 4}px, ${i * 4}px)`;
                
                w.innerHTML = `
                    <div class="card-i">
                        <div class="face back"></div> 
                        <div class="face front rarity-${card.rank.toUpperCase()}">
                            <img src="images/${currentPool}/${card.file}" onerror="this.src='https://via.placeholder.com/200x260/111/444'">
                            <div class="r-banner">${card.rank.toUpperCase()} ${card.isGuaranteed ? '<span style="color:#fde047;font-size:10px;margin-left:5px;">⚡保底</span>' : ''}</div>
                        </div>
                    </div>`;

                w.onclick = () => {
                    if (i !== active) return;
                    if (!rev) {
                        rev = true;
                        document.querySelectorAll('#stack .card-i').forEach(el => el.classList.add('flipped'));
                        document.getElementById('hint').innerText = '[ 點擊吸收資料庫 ]';
                    } else {
                        w.style.pointerEvents = 'none'; 
                        w.firstElementChild.classList.add('dismissed'); 
                        active++;
                        if (active >= cards.length) setTimeout(() => { overlay.style.display = 'none'; }, 700);
                    }
                };
                stack.appendChild(w);
            });
        }

        function renderBag() {
            const invMap = {};
            (uData.inventory || []).forEach(c => { invMap[c.id] = c; });
            const list = document.getElementById('bag-list');
            
            let html = '';
            let totalCards = 0;
            let unlockedCards = 0;
            const order = ['sss', 'ss', 's', 'a', 'b', 'c', 'd'];

            order.forEach(r => {
                if(!pools[currentPool][r]) return;
                pools[currentPool][r].forEach(file => {
                    totalCards++;
                    const cardId = `${currentPool}_${r}_${file}`;
                    const ownedCard = invMap[cardId];
                    const isLocked = !ownedCard;
                    const count = ownedCard ? ownedCard.count : 0;
                    
                    if (!isLocked) unlockedCards++;

                    html += `
                        <div class="bag-card rarity-${r.toUpperCase()} ${isLocked ? 'locked' : ''}">
                            <img src="images/${currentPool}/${file}" onerror="this.src='https://via.placeholder.com/100x150/111/444'">
                            <div class="rarity-label">${isLocked ? 'UNKNOWN' : r.toUpperCase()}</div>
                            ${count > 1 ? `<div class="count-badge">x${count}</div>` : ''}
                        </div>
                    `;
                });
            });

            document.getElementById('bag-count').innerText = `${unlockedCards} / ${totalCards}`;
            list.innerHTML = html;
        }

        window.switchPool = (pId, btn) => {
            currentPool = pId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('b-img').src = `images/${pId}/banner.jpg`;
            document.getElementById('b-txt').innerText = `> ARCHIVE: ${pId === 'freren' ? 'Frieren' : 'Classroom of the Elite'}`;
            if(!document.getElementById('page-bag').classList.contains('hidden')) renderBag();
        };

        window.tab = (id, b) => {
            ['page-gacha', 'page-mission', 'page-bag'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-i').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
            if(id === 'page-bag') renderBag();
        };
    </script>
</body>
</html>
