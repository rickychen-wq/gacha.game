<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Gacha_Terminal_Main</title>
    <style>
        body {
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 85%;
            background: rgba(10, 10, 10, 0.8);
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #333;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.1);
        }
        h2 {
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
        }
        .user-info { color: #ff0055; font-size: 14px; }
        .btn {
            background: transparent;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
            margin-right: 15px;
            text-transform: uppercase;
        }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        .btn-toggle { border-color: #aa00ff; color: #aa00ff; }
        .btn-toggle:hover { background: #aa00ff; color: #fff; box-shadow: 0 0 15px #aa00ff; }
        
        .display-area {
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: #0a0a0a;
            border: 1px dashed #444;
            padding: 15px;
            gap: 10px;
        }
        
        /* 卡片全新排版 (支援圖片) */
        .card {
            width: 120px;
            height: 180px;
            background: #111;
            border: 2px solid #555;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #fff;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.05); z-index: 10;}
        .card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-bottom: 1px solid #333;
        }
        .card .card-name {
            padding: 5px 0;
            font-weight: bold;
            text-align: center;
            width: 100%;
            background: rgba(0,0,0,0.8);
        }
        
        /* 稀有度特效 */
        .ssr { border-color: #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.5); }
        .ssr .card-name { color: #ff0055; }
        .sr { border-color: #aa00ff; }
        .sr .card-name { color: #aa00ff; }
        .r { border-color: #00ffcc; }
        .r .card-name { color: #00ffcc; }
        
        #sys-message { color: #00ffcc; margin-bottom: 15px; font-size: 14px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>
            <span id="system-title">>_ Gacha_Pool_Active</span>
            <span class="user-info" id="player-name">連線中...</span>
        </h2>
        <div id="sys-message">系統就緒。</div>
        
        <div id="gacha-view">
            <div class="display-area" id="draw-area">Waiting for command...</div>
            <button class="btn" id="btn-draw-1">單抽 (1x)</button>
            <button class="btn" id="btn-draw-5">五連抽 (5x)</button>
            <button class="btn btn-toggle" id="btn-go-backpack" style="float: right;">查看背包 (Inventory) >></button>
        </div>

        <div id="backpack-view" class="hidden">
            <div class="display-area" id="inventory-area">讀取資料庫中...</div>
            <button class="btn btn-toggle" id="btn-go-gacha"><< 返回抽卡 (Return)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // 你的專屬金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo",
            authDomain: "my-gacha-game-f7663.firebaseapp.com",
            projectId: "my-gacha-game-f7663",
            storageBucket: "my-gacha-game-f7663.firebasestorage.app",
            messagingSenderId: "1035192644413",
            appId: "1:1035192644413:web:1ad5337b9760a154cf8b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserDocRef = null;

        // 身分確認
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const realId = user.email.split('@')[0];
                currentUserDocRef = doc(db, "users", realId);
                const docSnap = await getDoc(currentUserDocRef);
                if (docSnap.exists()) {
                    document.getElementById('player-name').innerText = `ID: ${realId} | 玩家: ${docSnap.data().name}`;
                }
            } else {
                window.location.href = "index.html"; 
            }
        });

        // ==========================================
        // 🛠️ 卡池設定區 (改機率、換圖片都在這裡)
        // chance: 0.01 就是 1%。所有 chance 加起來最好是 1 (100%)
        // ==========================================
        const cardPool = [
            { 
                id: "card_ssr_01", 
                name: "傳說神器", 
                img: "https://via.placeholder.com/120x140/ff0055/ffffff?text=SSR_IMG", // 這裡換成你的圖片網址
                type: "ssr", 
                chance: 0.01 // 機率：1%
            },
            { 
                id: "card_sr_01", 
                name: "史詩裝備", 
                img: "https://via.placeholder.com/120x140/aa00ff/ffffff?text=SR_IMG",  // 這裡換成你的圖片網址
                type: "sr", 
                chance: 0.09 // 機率：9%
            },
            { 
                id: "card_r_01", 
                name: "普通素材", 
                img: "https://via.placeholder.com/120x140/00ffcc/000000?text=R_IMG",   // 這裡換成你的圖片網址
                type: "r", 
                chance: 0.90 // 機率：90%
            }
        ];

        // 用 ID 找卡片完整資料的小工具 (給背包用的)
        function getCardDataById(cardId) {
            return cardPool.find(c => c.id === cardId) || cardPool[2]; // 找不到就給 R 卡
        }

        // 抽卡數學邏輯
        function executeDraw() {
            let rand = Math.random();
            let cumulative = 0;
            for (let i = 0; i < cardPool.length; i++) {
                cumulative += cardPool[i].chance;
                if (rand <= cumulative) return cardPool[i];
            }
            return cardPool[cardPool.length - 1];
        }

        // 產生卡片 HTML 的公用函數
        function createCardHTML(card) {
            return `
                <div class="card ${card.type}">
                    <img src="${card.img}" alt="${card.name}">
                    <div class="card-name">${card.name}</div>
                </div>
            `;
        }

        // 執行抽卡
        async function performGacha(times) {
            const drawArea = document.getElementById('draw-area');
            const sysMessage = document.getElementById('sys-message');
            drawArea.innerHTML = '';
            sysMessage.innerText = "加密資料傳輸中...";
            
            let drawResultsIds = []; // 這次我們存卡片的 ID 進資料庫

            for(let i=0; i<times; i++) {
                let card = executeDraw();
                drawResultsIds.push(card.id);
                drawArea.innerHTML += createCardHTML(card);
            }

            try {
                await updateDoc(currentUserDocRef, {
                    inventory: arrayUnion(...drawResultsIds)
                });
                sysMessage.innerText = `[成功] 已將 ${times} 張卡片存入雲端背包。`;
            } catch (error) {
                sysMessage.innerText = `[錯誤] 資料庫寫入失敗：${error.message}`;
            }
        }

        // 讀取並顯示背包
        async function loadBackpack() {
            const inventoryArea = document.getElementById('inventory-area');
            const sysMessage = document.getElementById('sys-message');
            inventoryArea.innerHTML = '';
            sysMessage.innerText = "正在從雲端下載背包資料...";

            try {
                const docSnap = await getDoc(currentUserDocRef);
                if (docSnap.exists()) {
                    const inventoryIds = docSnap.data().inventory || [];
                    
                    if (inventoryIds.length === 0) {
                        inventoryArea.innerHTML = "<span style='color:#555;'>背包目前是空的。</span>";
                    } else {
                        // 把存檔的 ID 轉換成真實的卡片並顯示
                        inventoryIds.forEach(id => {
                            const cardData = getCardDataById(id);
                            inventoryArea.innerHTML += createCardHTML(cardData);
                        });
                        sysMessage.innerText = `[成功] 背包讀取完畢，共 ${inventoryIds.length} 張卡片。`;
                    }
                }
            } catch (error) {
                sysMessage.innerText = "[錯誤] 無法讀取背包資料";
            }
        }

        // 介面切換邏輯
        document.getElementById('btn-go-backpack').addEventListener('click', () => {
            document.getElementById('gacha-view').classList.add('hidden');
            document.getElementById('backpack-view').classList.remove('hidden');
            document.getElementById('system-title').innerText = ">_ INVENTORY_DATA";
            loadBackpack(); // 切換時自動讀取背包
        });

        document.getElementById('btn-go-gacha').addEventListener('click', () => {
            document.getElementById('backpack-view').classList.add('hidden');
            document.getElementById('gacha-view').classList.remove('hidden');
            document.getElementById('system-title').innerText = ">_ Gacha_Pool_Active";
            document.getElementById('sys-message').innerText = "系統就緒。";
        });

        // 抽卡按鈕綁定
        document.getElementById('btn-draw-1').addEventListener('click', () => performGacha(1));
        document.getElementById('btn-draw-5').addEventListener('click', () => performGacha(5));
    </script>
</body>
</html>
