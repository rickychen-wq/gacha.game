<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo_Leveling_System_V14.1_Final</title>
    <style>
        /* ==========================================================================
           [1] 系統全域 UI (暗黑科技感與 RGB 呼吸燈)
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #050505; 
            background-image: linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #00ffcc; font-family: 'Courier New', Courier, monospace; 
            display: flex; flex-direction: row; height: 100vh; width: 100vw; overflow: hidden; user-select: none;
        }
        .sidebar { 
            width: 240px; min-width: 240px; background: linear-gradient(180deg, rgba(15,15,15,0.95) 0%, rgba(0,0,0,1) 100%); 
            border-right: 2px solid #222; display: flex; flex-direction: column; padding: 30px 20px; gap: 15px; box-shadow: 10px 0 20px rgba(0,0,0,0.8); z-index: 10;
        }
        .sidebar-title { font-size: 15px; color: #00ffcc; margin-bottom: 25px; padding-left: 12px; letter-spacing: 4px; border-left: 4px solid #ff0055; font-weight: bold; }
        .pool-btn { background: rgba(255, 255, 255, 0.02); color: #777; border: 1px solid #333; padding: 18px 15px; text-align: left; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .pool-btn.active { border-color: #00ffcc; color: #00ffcc; background: rgba(0, 255, 204, 0.15); box-shadow: inset 0 0 15px rgba(0, 255, 204, 0.2); transform: translateX(5px); }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; overflow-x: hidden; padding: 40px; background: radial-gradient(circle at center, rgba(20,20,20,0.8) 0%, rgba(0,0,0,0.9) 100%); display: flex; justify-content: center; align-items: flex-start; }
        .container { width: 100%; max-width: 1200px; background: rgba(5, 5, 5, 0.95); padding: 35px; border: 2px solid #333; position: relative; animation: rgb-glow 8s linear infinite; }
        @keyframes rgb-glow { 0% { border-color: #ff0055; } 33% { border-color: #00ffcc; } 66% { border-color: #aa00ff; } 100% { border-color: #ff0055; } }
        h2 { border-bottom: 2px solid #222; padding-bottom: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 24px; }
        .user-info { color: #ff0055; font-size: 14px; font-weight: bold; background: rgba(255,0,85,0.1); padding: 8px 15px; border-radius: 4px; }
        .logout-link { color: #666; font-size: 12px; cursor: pointer; border-bottom: 1px dashed #666; margin-left: 15px; }
        #sys-message { color: #00ffcc; margin-bottom: 25px; font-size: 15px; font-weight: bold; height: 20px; }

        /* ==========================================================================
           [2] 史詩動畫與卡片封印
           ========================================================================== */
        #gacha-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.5s; }
        #gacha-overlay.active { opacity: 1; pointer-events: auto; }
        #anim-layer { position: absolute; width: 100vw; height: 100vh; top: 0; left: 0; overflow: hidden; pointer-events: none; }
        .meteor { position: absolute; width: 6px; height: 150px; top: -200px; border-radius: 50%; animation: meteor-fall 0.6s ease-in forwards; }
        .meteor-blue { background: linear-gradient(to bottom, transparent, #00ffcc); box-shadow: 0 50px 30px #00ffcc; }
        .meteor-gold { background: linear-gradient(to bottom, transparent, #ffd700); box-shadow: 0 50px 30px #ffd700; width: 8px; }
        @keyframes meteor-fall { 0% { transform: translateY(-10vh) translateX(-5vw) rotate(15deg); opacity: 1; } 100% { transform: translateY(80vh) translateX(20vw) rotate(15deg); opacity: 0; } }
        .explosion { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border-radius: 50%; transform: translate(-50%, -50%); animation: explode 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        .flash-gold { background: rgba(255,215,0,0.9); box-shadow: 0 0 100px 100px rgba(255,215,0,0.6); }
        @keyframes explode { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(250); opacity: 0; } }

        .display-area { display: flex; justify-content: flex-start; flex-wrap: wrap; gap: 20px; background: rgba(0,0,0,0.6); padding: 30px; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 30px; }
        .card { width: 150px; height: 220px; background: #000; border: 2px solid #333; position: relative; overflow: hidden; display: flex; flex-direction: column; transition: 0.4s; }
        .card img { width: 100%; height: 170px; object-fit: cover; filter: brightness(0.8); }
        .card.locked img { filter: brightness(0.15) grayscale(1) blur(2px); }
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(45deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 10px, rgba(10,10,10,0.8) 10px, rgba(10,10,10,0.8) 15px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; }
        .lock-text { color: #ff0055; font-weight: bold; border: 2px solid #ff0055; padding: 4px 10px; transform: rotate(-15deg); background: rgba(0,0,0,0.9); font-size: 13px; }
        .card-count { position: absolute; top: 8px; right: 8px; background: #ff0055; color: white; padding: 4px 10px; font-size: 12px; font-weight: bold; border-radius: 20px; z-index: 6; }
        .rank-section-title { width: 100%; border-left: 5px solid #00ffcc; padding-left: 15px; font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 15px; }

        .btn { background: rgba(0,0,0,0.5); color: #00ffcc; border: 1px solid #00ffcc; padding: 16px 40px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.3s; letter-spacing: 2px; }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 25px rgba(0,255,204,0.6); }
        .btn-purple { border-color: #aa00ff; color: #aa00ff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="gacha-overlay">
        <div id="anim-layer"></div>
        <div id="reveal-area" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; z-index: 10;"></div>
        <button class="btn btn-purple" id="btn-close-reveal" style="margin-top: 50px; opacity: 0; z-index: 10;">確認戰力</button>
    </div>

    <div class="sidebar">
        <div class="sidebar-title">TERMINAL_V14.1</div>
        <button class="pool-btn active" data-pool="freren">葬送的芙莉蓮</button>
        <button class="pool-btn" data-pool="elite">實力至上教室</button>
        <button class="pool-btn" data-pool="jujutsu">咒術迴戰</button>
        <div style="margin-top: auto;">
            <button class="btn btn-purple" id="btn-go-backpack" style="width: 100%; padding: 15px 0;">軍團圖鑑</button>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <h2>
                <span id="system-title">>_ DUNGEON: FRIEREN</span>
                <span>
                    <span class="user-info" id="player-name">USER: CONNECTING...</span>
                    <span class="logout-link" id="btn-logout">[LOGOUT]</span>
                </span>
            </h2>
            <div id="sys-message">系統連線穩定。等待召喚指令...</div>
            <div id="gacha-view">
                <div class="display-area" id="draw-area" style="justify-content: center; min-height: 450px;"><p>[ 待命中 ]</p></div>
                <div style="display: flex; gap: 20px; justify-content: center;">
                    <button class="btn" id="btn-draw-1">單次召喚</button>
                    <button class="btn" id="btn-draw-5">連續召喚</button>
                </div>
            </div>
            <div id="backpack-view" class="hidden">
                <div id="inventory-area"></div> 
                <button class="btn" id="btn-go-gacha"><< 返回大廳</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // 🔥 使用你提供的真實金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo",
            authDomain: "my-gacha-game-f7663.firebaseapp.com",
            projectId: "my-gacha-game-f7663",
            storageBucket: "my-gacha-game-f7663.firebasestorage.app",
            messagingSenderId: "1035192644413",
            appId: "1:1035192644413:web:1ad5337b9760a154cf8b54",
            measurementId: "G-XV7XQ3RMXW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserDocRef = null;
        let currentPoolId = 'freren';

        const poolSettings = {
            'freren': { 
                sss: ['sss1.jpg'], ss: ['ss1.jpg'], s: ['s1.jpg','s2.jpg','s3.jpg','s4.jpg','s5.jpg'],
                a: ['a1.jpg','a2.jpg','a3.jpg','a4.jpg','a5.jpg','a6.jpg','a7.jpg','a8.jpg','a9.jpg'],
                b: ['b1.jpg','b2.jpg','b3.jpg','b4.jpg','b5.jpg','b6.jpg','b7.jpg','b8.jpg','b9.jpg'],
                c: ['c1.jpg','c2.jpg','c3.jpg','c4.jpg','c5.jpg','c6.jpg','c7.jpg','c8.jpg','c9.jpg','c10.jpg'],
                d: ['d1.jpg','d2.jpg','d3.jpg','d4.jpg','d5.jpg','d6.jpg','d7.jpg','d8.jpg']
            },
            'elite': { sss:[], ss:[], s:[], a:[], b:[], c:[], d:[] },
            'jujutsu': { sss:[], ss:[], s:[], a:[], b:[], c:[], d:[] }
        };

        const chances = [ {r:'d',p:0.4}, {r:'c',p:0.3}, {r:'b',p:0.18}, {r:'a',p:0.08}, {r:'s',p:0.03}, {r:'ss',p:0.008}, {r:'sss',p:0.002} ];
        const rankOrder = ['sss', 'ss', 's', 'a', 'b', 'c', 'd'];

        // 🚨 修復無限跳轉邏輯
        onAuthStateChanged(auth, async (user) => {
            const id = user ? user.email.split('@')[0] : "test_commander";
            currentUserDocRef = doc(db, "users", id);
            document.getElementById('player-name').innerText = user ? `USER: ${id}` : "MODE: TESTER";
        });

        function createCardHTML(fullId, count = 1, isReveal = false) {
            const [pool, rank, index] = fullId.split('_');
            const isLocked = count === 0;
            const fileName = poolSettings[pool][rank][index] || 'locked.png';
            return `
            <div class="card rank-${rank} ${isLocked ? 'locked' : ''} ${isReveal ? 'reveal-card' : ''}">
                ${count > 1 ? `<div class="card-count">x${count}</div>` : ''}
                ${isLocked ? `<div class="lock-overlay"><div class="lock-text">未解鎖</div></div>` : ''}
                <img src="images/${pool}/${fileName}" onerror="this.src='https://via.placeholder.com/150x220/111/00ffcc?text=DATA_MISSING'">
                <div class="card-rank">${rank.toUpperCase()}</div>
            </div>`;
        }

        async function performGacha(times) {
            const overlay = document.getElementById('gacha-overlay');
            const revealArea = document.getElementById('reveal-area');
            const animLayer = document.getElementById('anim-layer');
            const btnClose = document.getElementById('btn-close-reveal');
            overlay.classList.add('active');
            revealArea.innerHTML = ''; animLayer.innerHTML = '';
            
            let results = [];
            for(let i=0; i<times; i++) {
                let rand = Math.random(), cum = 0, rank = 'd';
                for (let c of chances) { cum += c.p; if (rand <= cum) { rank = c.r; break; } }
                const index = Math.floor(Math.random() * (poolSettings[currentPoolId][rank].length || 1));
                const id = `${currentPoolId}_${rank}_${index}`;
                results.push(id);

                const meteor = document.createElement('div');
                meteor.className = `meteor ${['s','ss','sss'].includes(rank) ? 'meteor-gold' : 'meteor-blue'}`;
                meteor.style.left = `${30 + Math.random()*40}vw`;
                meteor.style.animationDelay = `${i*0.1}s`;
                animLayer.appendChild(meteor);
                revealArea.innerHTML += createCardHTML(id, 1, true);
            }

            setTimeout(() => {
                const exp = document.createElement('div'); exp.className = 'explosion flash-gold';
                animLayer.appendChild(exp); btnClose.style.opacity = '1';
            }, 600 + (times*100));

            const docSnap = await getDoc(currentUserDocRef);
            const newInv = ((docSnap.exists() ? docSnap.data().inventory : []) || []).concat(results);
            await setDoc(currentUserDocRef, { inventory: newInv }, { merge: true });
            document.getElementById('draw-area').innerHTML = results.map(id => createCardHTML(id, 1)).join('');
        }

        async function loadBackpack() {
            const invArea = document.getElementById('inventory-area');
            const docSnap = await getDoc(currentUserDocRef);
            const inv = (docSnap.exists() ? docSnap.data().inventory : []) || [];
            const stacked = {}; inv.forEach(id => stacked[id] = (stacked[id] || 0) + 1);
            
            let html = '';
            rankOrder.forEach(r => {
                html += `<div class="rank-section-title">${r.toUpperCase()} 級圖鑑</div><div class="display-area">`;
                (poolSettings[currentPoolId][r] || []).forEach((_, i) => {
                    const id = `${currentPoolId}_${r}_${i}`;
                    html += createCardHTML(id, stacked[id] || 0);
                });
                html += `</div>`;
            });
            invArea.innerHTML = html;
        }

        document.getElementById('btn-draw-1').addEventListener('click', () => performGacha(1));
        document.getElementById('btn-draw-5').addEventListener('click', () => performGacha(5));
        document.getElementById('btn-close-reveal').addEventListener('click', () => document.getElementById('gacha-overlay').classList.remove('active'));
        document.getElementById('btn-go-backpack').addEventListener('click', () => { 
            document.getElementById('gacha-view').classList.add('hidden'); 
            document.getElementById('backpack-view').classList.remove('hidden'); 
            loadBackpack(); 
        });
        document.getElementById('btn-go-gacha').addEventListener('click', () => { 
            document.getElementById('backpack-view').classList.add('hidden'); 
            document.getElementById('gacha-view').classList.remove('hidden'); 
        });
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth).then(() => window.location.reload()));
        document.querySelectorAll('.pool-btn').forEach(btn => btn.addEventListener('click', () => {
            document.querySelectorAll('.pool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentPoolId = btn.dataset.pool;
            document.getElementById('system-title').innerText = `>_ DUNGEON: ${currentPoolId.toUpperCase()}`;
        }));
    </script>
</body>
</html>
