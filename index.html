<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling - 登入系統</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { 
            background-color: #050505; color: #00ffcc; height: 100vh; display: flex; 
            justify-content: center; align-items: center; 
            background-image: linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .login-box {
            background: rgba(10, 10, 10, 0.9); padding: 40px; border: 2px solid #333;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); text-align: center; width: 400px;
            animation: glow 4s infinite alternate;
        }
        @keyframes glow { from { border-color: #00ffcc; } to { border-color: #ff0055; } }
        h1 { margin-bottom: 30px; font-size: 24px; letter-spacing: 3px; border-bottom: 2px solid #222; padding-bottom: 10px; }
        input {
            width: 100%; padding: 15px; margin-bottom: 20px; background: #000; border: 1px solid #333;
            color: #00ffcc; font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }
        .btn {
            width: 100%; padding: 15px; background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc;
            color: #00ffcc; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 15px;
        }
        .btn:hover { background: #00ffcc; color: #000; }
        .btn-reg { border-color: #ff0055; color: #ff0055; background: rgba(255, 0, 85, 0.1); }
        .btn-reg:hover { background: #ff0055; color: #fff; }
        #msg { color: #ff0055; font-size: 14px; min-height: 20px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>SYSTEM_LOGIN</h1>
        <div id="msg"></div>
        <input type="email" id="email" placeholder="輸入信箱 (Email)">
        <input type="password" id="password" placeholder="輸入密碼 (Password)">
        <button class="btn" id="btn-login">神經連結 (登入)</button>
        <button class="btn btn-reg" id="btn-register">創建身分 (註冊)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJ-NRfp17PUpSdYG_JzN0xARc13z5rOwo",
            authDomain: "my-gacha-game-f7663.firebaseapp.com",
            projectId: "my-gacha-game-f7663",
            storageBucket: "my-gacha-game-f7663.firebasestorage.app",
            messagingSenderId: "1035192644413",
            appId: "1:1035192644413:web:1ad5337b9760a154cf8b54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 如果已經登入過，直接跳轉到遊戲
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "game.html";
        });

        const emailInp = document.getElementById('email');
        const passInp = document.getElementById('password');
        const msgBox = document.getElementById('msg');

        document.getElementById('btn-login').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, emailInp.value, passInp.value)
                .then(() => { msgBox.style.color = '#00ffcc'; msgBox.innerText = "登入成功，正在跳轉..."; })
                .catch(error => msgBox.innerText = "錯誤: 信箱或密碼不正確");
        });

        document.getElementById('btn-register').addEventListener('click', () => {
            createUserWithEmailAndPassword(auth, emailInp.value, passInp.value)
                .then(() => { msgBox.style.color = '#00ffcc'; msgBox.innerText = "註冊成功！準備跳轉..."; })
                .catch(error => msgBox.innerText = "錯誤: 密碼太弱或信箱已存在");
        });
    </script>
</body>
</html>
